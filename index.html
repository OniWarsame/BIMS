<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#000610}
      body{overflow-x:hidden;cursor:none}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <!-- Canvas runs BEFORE React — guaranteed to show regardless of bundle cache -->
    <canvas id="bims-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
(function(){
  const cv=document.getElementById('bims-canvas');
  if(!cv)return;
  const x=cv.getContext('2d');
  let T=0,irisRot=0,scanAng=0,eox=0,eoy=0;
  const M={x:-999,y:-999,px:-999,py:-999,down:false};
  const SM={x:-999,y:-999};
  const RINGS=[],SPARKS=[];
  let nodes=[],traces=[],motes=[];

  window.addEventListener('mousemove',e=>{M.px=M.x;M.py=M.y;M.x=e.clientX;M.y=e.clientY;},{passive:true});
  window.addEventListener('mousedown',()=>{M.down=true;setTimeout(()=>M.down=false,250);});
  window.addEventListener('mouseleave',()=>{M.x=-999;M.y=-999;});
  window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;init();});

  const EYE=new Image();let eyeOK=false;
  EYE.onload=()=>eyeOK=true;
  EYE.src='/eye2.jpg';

  function init(){
    const W=cv.width,H=cv.height;
    nodes=Array.from({length:38},(_,i)=>{
      const nx=20+Math.random()*(W-40),ny=20+Math.random()*(H-40);
      return{x:nx,y:ny,ox:nx,oy:ny,vx:0,vy:0,r:i<6?2.5+Math.random()*2:0.8+Math.random()*1.6,
        hue:[193,42,165,145,270][i%5],phase:Math.random()*Math.PI*2};
    });
    traces=Array.from({length:26},()=>{
      const pts=[];let px=Math.random()*W,py=Math.random()*H;
      pts.push({x:px,y:py});
      for(let s=0;s<2+Math.floor(Math.random()*4);s++){
        Math.random()>.5?(px+=(Math.random()-.5)*170):(py+=(Math.random()-.5)*140);
        pts.push({x:Math.max(5,Math.min(W-5,px)),y:Math.max(5,Math.min(H-5,py))});
      }
      return{pts,hue:[193,42,165,270][Math.floor(Math.random()*4)],alpha:.04+Math.random()*.07,flow:Math.random()};
    });
    motes=Array.from({length:50},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.12,
      r:.3+Math.random()*1,life:Math.random()*Math.PI*2,gold:Math.random()<.2
    }));
  }

  function draw(){
    T+=.016;irisRot+=.0015;scanAng=(scanAng+.014)%(Math.PI*2);
    const W=cv.width,H=cv.height,CX=W/2,CY=H/2;
    // eye size — fills 88% of height
    const eh=H*.88;
    const ew=eyeOK?eh*(EYE.width/EYE.height):eh*2.1;
    const ex=CX-ew/2,ey=CY-eh/2;
    const pupilR=Math.min(ew,eh)*.10;
    const irisR=Math.min(ew,eh)*.32;
    if(M.x>0){eox+=(((M.x-CX)/W)*22-eox)*.03;eoy+=(((M.y-CY)/H)*14-eoy)*.03;}

    // 1. void
    x.fillStyle='#000';x.fillRect(0,0,W,H);

    // 2. EYE — massive
    if(eyeOK){
      x.save();
      x.beginPath();x.ellipse(CX,CY,ew/2,eh/2.1,0,0,Math.PI*2);x.clip();
      x.globalAlpha=.92+.05*Math.sin(T*.35);
      x.drawImage(EYE,ex+eox*.5,ey+eoy*.5,ew,eh);
      const vig=x.createRadialGradient(CX,CY,ew*.28,CX,CY,ew*.54);
      vig.addColorStop(0,'transparent');vig.addColorStop(.75,'rgba(0,3,12,.04)');vig.addColorStop(1,'rgba(0,2,10,.88)');
      x.globalAlpha=1;x.fillStyle=vig;x.fillRect(0,0,W,H);x.restore();
      // edge fades
      const lf=x.createLinearGradient(0,0,ew*.12,0);
      lf.addColorStop(0,'rgba(0,0,0,1)');lf.addColorStop(1,'transparent');
      x.fillStyle=lf;x.fillRect(0,0,ew*.12,H);
      const rf=x.createLinearGradient(W-ew*.12,0,W,0);
      rf.addColorStop(0,'transparent');rf.addColorStop(1,'rgba(0,0,0,1)');
      x.fillStyle=rf;x.fillRect(W-ew*.12,0,ew*.12,H);
      const tf=x.createLinearGradient(0,0,0,H*.07);
      tf.addColorStop(0,'rgba(0,0,0,1)');tf.addColorStop(1,'transparent');
      x.fillStyle=tf;x.fillRect(0,0,W,H*.07);
      const bf=x.createLinearGradient(0,H*.93,0,H);
      bf.addColorStop(0,'transparent');bf.addColorStop(1,'rgba(0,0,0,1)');
      x.fillStyle=bf;x.fillRect(0,H*.93,W,H*.07);
    }

    // 3. iris fibers
    x.save();x.beginPath();x.arc(CX,CY,irisR,0,Math.PI*2);x.clip();
    for(let i=0;i<72;i++){
      const ang=(i/72)*Math.PI*2+irisRot,jit=Math.sin(T*.45+i*.65)*.04;
      x.beginPath();
      x.moveTo(CX+Math.cos(ang+jit)*pupilR*1.12,CY+Math.sin(ang+jit)*pupilR*1.12);
      x.lineTo(CX+Math.cos(ang)*irisR*.92,CY+Math.sin(ang)*irisR*.92);
      x.strokeStyle=`hsla(${i%5===0?42:193},100%,70%,${.06+.04*Math.sin(T*.55+i)})`;
      x.lineWidth=.55;x.stroke();
    }
    x.restore();

    // 4. scanning arc
    x.save();x.shadowBlur=20;x.shadowColor='rgba(0,255,160,.9)';
    x.strokeStyle='rgba(0,255,160,.70)';x.lineWidth=2.4;
    x.beginPath();x.arc(CX,CY,irisR*1.08,scanAng,scanAng+Math.PI*.6);x.stroke();
    x.beginPath();x.arc(CX+Math.cos(scanAng)*irisR*1.08,CY+Math.sin(scanAng)*irisR*1.08,4,0,Math.PI*2);
    x.fillStyle='rgba(0,255,160,1)';x.fill();x.shadowBlur=0;x.restore();
    // counter arc
    x.save();x.shadowBlur=12;x.shadowColor='rgba(60,180,255,.85)';
    x.strokeStyle='rgba(60,180,255,.50)';x.lineWidth=1.4;
    x.beginPath();x.arc(CX,CY,irisR*1.26,-scanAng*.6,-scanAng*.6+Math.PI*.4);
    x.stroke();x.shadowBlur=0;x.restore();
    // pulse rings
    for(let i=0;i<3;i++){
      const ph=((T*.32+i*2.1)%(Math.PI*2));
      const pr=irisR*(1.1+.35*(ph/(Math.PI*2)));
      const pa=Math.max(0,.18*(1-ph/(Math.PI*2)));
      x.beginPath();x.arc(CX,CY,pr,0,Math.PI*2);
      x.strokeStyle=`rgba(0,175,255,${pa})`;x.lineWidth=.9;x.stroke();
    }

    // 5. nodes
    for(const n of nodes){
      n.phase+=.011;const pulse=.5+.5*Math.sin(n.phase);
      if(M.x>0){const dx=M.x-n.x,dy=M.y-n.y,d=Math.hypot(dx,dy);if(d<155&&d>.5){const f=.015*(1-d/155);n.vx+=dx/d*f;n.vy+=dy/d*f;}}
      n.vx+=(n.ox-n.x)*.014;n.vy+=(n.oy-n.y)*.014;n.vx*=.87;n.vy*=.87;n.x+=n.vx;n.y+=n.vy;
      x.save();x.shadowBlur=n.r>2?7:3;x.shadowColor=`hsla(${n.hue},100%,70%,.7)`;
      x.beginPath();x.arc(n.x,n.y,n.r*(.85+.15*pulse),0,Math.PI*2);
      x.strokeStyle=`hsla(${n.hue},100%,70%,${.26+.26*pulse})`;x.lineWidth=n.r>2?1.1:.75;x.stroke();
      x.shadowBlur=0;x.restore();
    }
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d>115)continue;
      x.beginPath();x.moveTo(nodes[i].x,nodes[i].y);x.lineTo(nodes[j].x,nodes[j].y);
      x.strokeStyle=`rgba(0,180,255,${(1-d/115)*.045})`;x.lineWidth=.4;x.stroke();
    }

    // 6. traces
    for(const tr of traces){
      tr.flow=(tr.flow+.002)%1;
      x.beginPath();x.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++)x.lineTo(tr.pts[i].x,tr.pts[i].y);
      x.strokeStyle=`hsla(${tr.hue},100%,58%,${tr.alpha*.7})`;x.lineWidth=.5;x.stroke();
      const tot=tr.pts.slice(1).reduce((a,p,i)=>a+Math.hypot(p.x-tr.pts[i].x,p.y-tr.pts[i].y),0);
      let tgt=tr.flow*tot,wlk=0;
      for(let i=1;i<tr.pts.length;i++){
        const seg=Math.hypot(tr.pts[i].x-tr.pts[i-1].x,tr.pts[i].y-tr.pts[i-1].y);
        if(wlk+seg>=tgt){
          const t2=(tgt-wlk)/seg;
          const px2=tr.pts[i-1].x+t2*(tr.pts[i].x-tr.pts[i-1].x);
          const py2=tr.pts[i-1].y+t2*(tr.pts[i].y-tr.pts[i-1].y);
          x.save();x.shadowBlur=7;x.shadowColor=`hsla(${tr.hue},100%,80%,1)`;
          x.beginPath();x.arc(px2,py2,1.8,0,Math.PI*2);x.fillStyle=`hsla(${tr.hue},100%,88%,.9)`;x.fill();
          x.shadowBlur=0;x.restore();break;
        }wlk+=seg;
      }
    }

    // 7. motes
    for(const m of motes){
      m.x+=m.vx;m.y+=m.vy;m.life+=.006;
      if(m.x<0)m.x=W;if(m.x>W)m.x=0;if(m.y<0)m.y=H;if(m.y>H)m.y=0;
      const a=.13+.13*Math.sin(m.life);
      x.beginPath();x.arc(m.x,m.y,m.r,0,Math.PI*2);
      x.fillStyle=m.gold?`rgba(255,190,30,${a*.5})`:`rgba(0,190,255,${a*.28})`;x.fill();
    }

    // 8. iris border glow
    const bp=.5+.5*Math.sin(T*.68);
    x.save();x.shadowBlur=38+16*bp;x.shadowColor=`rgba(0,185,255,${.75+.15*bp})`;
    x.strokeStyle=`rgba(0,200,255,${.28+.20*bp})`;x.lineWidth=2;
    x.beginPath();x.arc(CX,CY,irisR*1.08,0,Math.PI*2);x.stroke();x.shadowBlur=0;x.restore();

    // 9. HUD labels — float inside eye, above/below iris
    const lp=.5+.5*Math.sin(T*2.2);
    x.font="bold 11px 'Courier New',monospace";x.textAlign='center';
    x.fillStyle=`rgba(0,255,160,${.65+.28*lp})`;
    x.fillText('● IRIS BIOMETRIC ACTIVE',CX,CY-irisR*1.38);
    x.font="8px 'Courier New',monospace";x.fillStyle=`rgba(0,200,255,${.52+.24*lp})`;
    x.fillText('MATCH '+Math.floor(87+8*Math.abs(Math.sin(T*.38)))+'%  ·  DEPTH LOCK  ·  NEURAL MAP',CX,CY-irisR*1.22);
    x.font="7px 'Courier New',monospace";
    ['RETINA ████░','VASCULAR ███░','DEPTH ████░','NEURAL ████░'].forEach((s,i)=>{
      const ang=(-Math.PI*.5)+(i/4)*Math.PI*2+(Math.PI/4);
      const lx=CX+Math.cos(ang)*irisR*1.55,ly=CY+Math.sin(ang)*irisR*1.55;
      x.textAlign='center';x.fillStyle=`rgba(0,200,255,${.28+.20*Math.sin(T*1.6+i*.8)})`;
      x.fillText(s,lx,ly);
    });

    // 10. corner brackets
    [[18,18,1,1],[W-18,18,-1,1],[W-18,H-18,-1,-1],[18,H-18,1,-1]].forEach(([cx2,cy2,sx2,sy2],i)=>{
      const h2=i%2===0?193:42,sz=18;
      x.strokeStyle=`hsla(${h2},100%,62%,.20)`;x.lineWidth=1.2;
      x.beginPath();x.moveTo(cx2+sx2*sz,cy2);x.lineTo(cx2,cy2);x.lineTo(cx2,cy2+sy2*sz);x.stroke();
      const pa=.20+.20*Math.sin(T*1.4+i);
      x.save();x.shadowBlur=5;x.shadowColor=`hsla(${h2},100%,72%,.8)`;
      x.beginPath();x.arc(cx2,cy2,2.2,0,Math.PI*2);x.fillStyle=`hsla(${h2},100%,76%,${pa})`;x.fill();
      x.shadowBlur=0;x.restore();
    });

    // 11. mouse reticle
    if(M.x>0){
      SM.x=SM.x<0?M.x:SM.x+(M.x-SM.x)*.09;
      SM.y=SM.y<0?M.y:SM.y+(M.y-SM.y)*.09;
      const cx=SM.x,cy=SM.y;
      const spd=Math.hypot(M.x-M.px,M.y-M.py),hot=spd>1.8;
      const onIris=Math.hypot(cx-CX,cy-CY)<irisR;
      const col=a=>onIris?`rgba(0,255,160,${a})`:`rgba(0,200,255,${a})`;
      // bloom
      const bl=x.createRadialGradient(cx,cy,0,cx,cy,48);
      bl.addColorStop(0,col(hot?.18:.09));bl.addColorStop(1,'transparent');
      x.fillStyle=bl;x.beginPath();x.arc(cx,cy,48,0,Math.PI*2);x.fill();
      // outer arc
      x.save();x.translate(cx,cy);x.rotate(T*2.0+spd*.05);
      x.beginPath();x.arc(0,0,28,0,Math.PI*1.6);
      x.strokeStyle=col(.62+.20*Math.sin(T*2.5));x.lineWidth=1.8;x.stroke();
      const ec=Math.PI*1.6;
      x.save();x.shadowBlur=7;x.shadowColor=col(1);
      x.beginPath();x.arc(Math.cos(ec)*28,Math.sin(ec)*28,2.4,0,Math.PI*2);
      x.fillStyle=col(.95);x.fill();x.shadowBlur=0;x.restore();x.restore();
      // inner arc
      x.save();x.translate(cx,cy);x.rotate(-T*1.5);
      x.beginPath();x.arc(0,0,18,Math.PI*.2,Math.PI*1.8);
      x.strokeStyle=col(.38+.18*Math.sin(T*3));x.lineWidth=1;x.stroke();x.restore();
      // micro ring
      x.beginPath();x.arc(cx,cy,11,0,Math.PI*2);x.strokeStyle=col(.20+.12*Math.sin(T*2.2));x.lineWidth=.75;x.stroke();
      // diamond
      x.save();x.shadowBlur=8;x.shadowColor=col(.85);x.strokeStyle=col(.72);x.lineWidth=1.3;
      x.beginPath();x.moveTo(cx,cy-10.5);x.lineTo(cx+6,cy);x.lineTo(cx,cy+10.5);x.lineTo(cx-6,cy);x.closePath();x.stroke();
      x.shadowBlur=0;x.restore();
      // centre dot
      x.save();x.shadowBlur=hot?18:10;x.shadowColor=hot?'rgba(0,255,160,1)':col(.9);
      x.beginPath();x.arc(cx,cy,hot?3.8:2.6,0,Math.PI*2);
      x.fillStyle=hot?'rgba(0,255,160,1)':'rgba(195,238,255,.97)';x.fill();x.shadowBlur=0;x.restore();
      // ticks
      x.strokeStyle=col(hot?.85:.52);x.lineWidth=hot?1.5:1;
      [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
        x.beginPath();x.moveTo(cx+dx*6,cy+dy*6);x.lineTo(cx+dx*17,cy+dy*17);x.stroke();
      });
      if(hot){
        x.font="6.5px 'Courier New',monospace";x.textAlign='left';x.fillStyle=col(.72);
        x.fillText('X:'+String(Math.floor(cx)).padStart(4,'0'),cx+42,cy-2);
        x.fillText('Y:'+String(Math.floor(cy)).padStart(4,'0'),cx+42,cy+10);
        x.fillStyle=col(.45);x.fillText(onIris?'● IRIS LOCK':'● TRACKING',cx+42,cy+24);
      }
    }

    // 12. click effects
    if(M.down&&M.x>0){
      for(let i=0;i<5;i++)RINGS.push({x:M.x,y:M.y,r:4,max:72+i*28,a:.92-i*.16,hue:193+i*18});
      for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;SPARKS.push({x:M.x,y:M.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,age:0,life:30+Math.random()*45,hue:[193,42,145,210,165][i%5]});}
    }
    for(let i=RINGS.length-1;i>=0;i--){
      const r=RINGS[i];r.r+=3.6;r.a*=.90;if(r.r>r.max||r.a<.01){RINGS.splice(i,1);continue;}
      x.save();x.shadowBlur=12;x.shadowColor=`hsla(${r.hue},100%,72%,.8)`;
      x.beginPath();x.arc(r.x,r.y,r.r,0,Math.PI*2);x.strokeStyle=`hsla(${r.hue},100%,72%,${r.a})`;x.lineWidth=2;x.stroke();x.shadowBlur=0;x.restore();
    }
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.95;s.vy*=.95;s.age++;
      if(s.age>=s.life){SPARKS.splice(i,1);continue;}
      const p=s.age/s.life,a=p<.2?p/.2:1-(p-.2)/.8;
      x.beginPath();x.arc(s.x,s.y,2.2*(1-p*.5),0,Math.PI*2);x.fillStyle=`hsla(${s.hue},100%,72%,${a*.9})`;x.fill();
    }

    requestAnimationFrame(draw);
  }

  cv.width=innerWidth;cv.height=innerHeight;
  init();requestAnimationFrame(draw);
})();
    </script>
  </body>
</html>
