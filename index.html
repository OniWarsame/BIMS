<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#000610}
      body{overflow-x:hidden;cursor:none}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <!-- Canvas runs BEFORE React — guaranteed to show regardless of bundle cache -->
    <canvas id="bims-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
(function(){
  const cv=document.getElementById('bims-canvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  let T=0,ER=0;
  const M={x:-999,y:-999,px:-999,py:-999,down:false};
  const SM={x:-999,y:-999};
  const RINGS=[],SPARKS=[];
  let nodes=[],motes=[],circuits=[];

  window.addEventListener('mousemove',e=>{M.px=M.x;M.py=M.y;M.x=e.clientX;M.y=e.clientY;},{passive:true});
  window.addEventListener('mousedown',()=>{M.down=true;setTimeout(()=>M.down=false,250);});
  window.addEventListener('mouseleave',()=>{M.x=-999;M.y=-999;});
  window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;init();});

  const EYE=new Image();let eyeOK=false;
  EYE.onload=()=>eyeOK=true;
  EYE.src='/eye2.jpg';

  function init(){
    const W=cv.width,H=cv.height,CX=W/2,CY=H/2;
    ER=Math.min(W,H)*.23;
    nodes=[];let att=0;
    while(nodes.length<50&&att<2000){att++;
      const nx=20+Math.random()*(W-40),ny=20+Math.random()*(H-40);
      if(Math.hypot(nx-CX,ny-CY)<ER*1.6)continue;
      const i=nodes.length;
      nodes.push({x:nx,y:ny,ox:nx,oy:ny,vx:0,vy:0,r:i<8?2.5+Math.random()*2:.8+Math.random()*1.6,
        hue:[193,42,165,145,270][i%5],phase:Math.random()*Math.PI*2});
    }
    circuits=[];
    for(let t=0;t<22;t++){
      const sa=(t/22)*Math.PI*2+(Math.random()-.5)*.3;
      const pts=[];
      let cx=CX+Math.cos(sa)*ER*1.05,cy=CY+Math.sin(sa)*ER*1.05;
      pts.push({x:cx,y:cy});
      for(let s=0;s<3+Math.floor(Math.random()*4);s++){
        const mx=80+Math.random()*110,dr=sa+(Math.random()-.5)*.8;
        Math.random()>.5?(cx+=Math.cos(dr)*mx):(cy+=Math.sin(dr)*mx);
        pts.push({x:Math.max(10,Math.min(W-10,cx)),y:Math.max(10,Math.min(H-10,cy))});
      }
      circuits.push({pts,hue:[193,42,165,270,145][t%5],alpha:.06+Math.random()*.09,flow:Math.random()});
    }
    motes=[];
    while(motes.length<52){
      const mx=Math.random()*W,my=Math.random()*H;
      if(Math.hypot(mx-CX,my-CY)<ER*1.3)continue;
      motes.push({x:mx,y:my,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.13,
        r:.3+Math.random()*1.1,life:Math.random()*Math.PI*2,gold:Math.random()<.22});
    }
  }

  function draw(){
    T+=.016;
    const W=cv.width,H=cv.height,CX=W/2,CY=H/2;

    // void
    ctx.fillStyle='#000913';ctx.fillRect(0,0,W,H);
    // ambient
    const deep=ctx.createRadialGradient(CX,CY,0,CX,CY,W*.65);
    deep.addColorStop(0,'rgba(0,15,45,.52)');deep.addColorStop(.4,'rgba(0,8,25,.18)');deep.addColorStop(1,'transparent');
    ctx.fillStyle=deep;ctx.fillRect(0,0,W,H);

    // motes
    for(const m of motes){
      m.x+=m.vx;m.y+=m.vy;m.life+=.006;
      if(m.x<0)m.x=W;if(m.x>W)m.x=0;if(m.y<0)m.y=H;if(m.y>H)m.y=0;
      const a=.16+.14*Math.sin(m.life);
      ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
      ctx.fillStyle=m.gold?`rgba(255,190,30,${a*.5})`:`rgba(0,195,255,${a*.3})`;ctx.fill();
    }

    // circuit traces
    for(const tr of circuits){
      tr.flow=(tr.flow+.0018)%1;
      ctx.beginPath();ctx.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++)ctx.lineTo(tr.pts[i].x,tr.pts[i].y);
      ctx.strokeStyle=`hsla(${tr.hue},100%,58%,${tr.alpha})`;ctx.lineWidth=.6;ctx.stroke();
      for(const p of tr.pts){ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fillStyle=`hsla(${tr.hue},100%,68%,${tr.alpha*1.7})`;ctx.fill();}
      const tot=tr.pts.slice(1).reduce((a,p,i)=>a+Math.hypot(p.x-tr.pts[i].x,p.y-tr.pts[i].y),0);
      let tgt=tr.flow*tot,wlk=0;
      for(let i=1;i<tr.pts.length;i++){
        const seg=Math.hypot(tr.pts[i].x-tr.pts[i-1].x,tr.pts[i].y-tr.pts[i-1].y);
        if(wlk+seg>=tgt){
          const t2=(tgt-wlk)/seg;
          const px2=tr.pts[i-1].x+t2*(tr.pts[i].x-tr.pts[i-1].x);
          const py2=tr.pts[i-1].y+t2*(tr.pts[i].y-tr.pts[i-1].y);
          ctx.save();ctx.shadowBlur=8;ctx.shadowColor=`hsla(${tr.hue},100%,80%,1)`;
          ctx.beginPath();ctx.arc(px2,py2,1.9,0,Math.PI*2);ctx.fillStyle=`hsla(${tr.hue},100%,88%,.9)`;ctx.fill();
          ctx.shadowBlur=0;ctx.restore();break;
        }wlk+=seg;
      }
    }

    // dot grid
    for(let gx=0;gx<W;gx+=46)for(let gy=0;gy<H;gy+=46){
      if(Math.hypot(gx-CX,gy-CY)<ER*1.5)continue;
      const a=.015+.011*Math.sin(T*.4+gx*.04+gy*.03);
      ctx.beginPath();ctx.arc(gx,gy,.6,0,Math.PI*2);ctx.fillStyle=`hsla(210,100%,65%,${a})`;ctx.fill();
    }

    // nodes
    for(const n of nodes){
      n.phase+=.011;const pulse=.5+.5*Math.sin(n.phase);
      if(M.x>0){const dx=M.x-n.x,dy=M.y-n.y,d=Math.hypot(dx,dy);
        const ndc=Math.hypot(n.x-CX,n.y-CY);
        if(d<165&&d>.5&&ndc>ER*1.55){const f=.015*(1-d/165);n.vx+=dx/d*f;n.vy+=dy/d*f;}}
      n.vx+=(n.ox-n.x)*.014;n.vy+=(n.oy-n.y)*.014;n.vx*=.87;n.vy*=.87;n.x+=n.vx;n.y+=n.vy;
      const dc=Math.hypot(n.x-CX,n.y-CY);
      if(dc<ER*1.45){const ang=Math.atan2(n.y-CY,n.x-CX);n.x=CX+Math.cos(ang)*ER*1.46;n.y=CY+Math.sin(ang)*ER*1.46;n.vx*=-.3;n.vy*=-.3;}
      ctx.save();ctx.shadowBlur=n.r>2?8:3;ctx.shadowColor=`hsla(${n.hue},100%,70%,.7)`;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*(.85+.15*pulse),0,Math.PI*2);
      ctx.strokeStyle=`hsla(${n.hue},100%,72%,${.30+.30*pulse})`;ctx.lineWidth=n.r>2?1.1:.8;ctx.stroke();
      ctx.shadowBlur=0;ctx.restore();
    }
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d>112)continue;
      ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);
      ctx.strokeStyle=`rgba(0,185,255,${(1-d/112)*.06})`;ctx.lineWidth=.4;ctx.stroke();
    }

    // === EYE PORTAL ===
    for(let layer=3;layer>=0;layer--){
      const lr=ER*(1.0+layer*.45),la=[.24,.13,.06,.025][layer];
      const g=ctx.createRadialGradient(CX,CY,ER*.85,CX,CY,lr);
      g.addColorStop(0,`rgba(0,150,255,${la})`);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }
    if(eyeOK){
      const iw=EYE.width,ih=EYE.height;
      const cropR=ih*.5,sx=iw/2-cropR,sy=0,ss=cropR*2;
      ctx.save();
      ctx.beginPath();ctx.arc(CX,CY,ER,0,Math.PI*2);ctx.clip();
      ctx.globalAlpha=.94;
      ctx.drawImage(EYE,sx,sy,ss,ss,CX-ER,CY-ER,ER*2,ER*2);
      ctx.globalAlpha=1;ctx.restore();
      // rim
      const rp=.5+.5*Math.sin(T*.7);
      ctx.save();ctx.shadowBlur=30+14*rp;ctx.shadowColor=`rgba(0,200,255,${.9+.08*rp})`;
      ctx.strokeStyle=`rgba(0,215,255,${.52+.26*rp})`;ctx.lineWidth=2.8;
      ctx.beginPath();ctx.arc(CX,CY,ER,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;ctx.restore();
      ctx.beginPath();ctx.arc(CX,CY,ER+5,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,180,255,${.10+.08*rp})`;ctx.lineWidth=1;ctx.stroke();
    }

    // === SCANNERS orbiting the eye ===
    const sa1=(T*.55)%(Math.PI*2),sa2=-(T*.38)%(Math.PI*2);
    const orb1=ER*1.22,orb2=ER*1.42;
    ctx.save();ctx.shadowBlur=18;ctx.shadowColor='rgba(0,255,160,1)';
    ctx.strokeStyle='rgba(0,255,160,.75)';ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(CX,CY,orb1,sa1,sa1+Math.PI*.55);ctx.stroke();
    ctx.shadowBlur=24;ctx.beginPath();ctx.arc(CX+Math.cos(sa1)*orb1,CY+Math.sin(sa1)*orb1,5.5,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,160,1)';ctx.fill();ctx.shadowBlur=0;ctx.restore();
    ctx.save();ctx.shadowBlur=12;ctx.shadowColor='rgba(60,160,255,.9)';
    ctx.strokeStyle='rgba(60,160,255,.52)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(CX,CY,orb2,sa2,sa2+Math.PI*.38);ctx.stroke();
    ctx.beginPath();ctx.arc(CX+Math.cos(sa2)*orb2,CY+Math.sin(sa2)*orb2,3.5,0,Math.PI*2);
    ctx.fillStyle='rgba(80,180,255,.9)';ctx.fill();ctx.shadowBlur=0;ctx.restore();
    ctx.save();ctx.setLineDash([4,8]);
    ctx.strokeStyle='rgba(0,180,255,.09)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(CX,CY,orb1,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(60,140,255,.06)';ctx.lineWidth=.8;
    ctx.beginPath();ctx.arc(CX,CY,orb2,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
    // pulse rings
    for(let i=0;i<4;i++){
      const ph=((T*.28+i*1.6)%(Math.PI*2));
      const pr=ER*(1.0+.5*(ph/(Math.PI*2)));
      const pa=Math.max(0,.21*(1-ph/(Math.PI*2)));
      ctx.beginPath();ctx.arc(CX,CY,pr,0,Math.PI*2);ctx.strokeStyle=`rgba(0,175,255,${pa})`;ctx.lineWidth=.8;ctx.stroke();
    }
    // tick marks
    const tickR=orb2*1.08;
    for(let i=0;i<24;i++){
      const ang=(i/24)*Math.PI*2,iM=i%6===0,iS=i%3===0;
      const inn=tickR*(iM?.88:iS?.92:.95),out=tickR,br=iM?.52:iS?.28:.13;
      ctx.beginPath();ctx.moveTo(CX+Math.cos(ang)*inn,CY+Math.sin(ang)*inn);
      ctx.lineTo(CX+Math.cos(ang)*out,CY+Math.sin(ang)*out);
      ctx.strokeStyle=`rgba(0,180,255,${br})`;ctx.lineWidth=iM?1.5:.75;ctx.stroke();
    }
    // HUD panels
    const panels=[
      {ang:-Math.PI*.22,r:ER*2.1,label:'RETINA SCAN',val:Math.floor(94+4*Math.abs(Math.sin(T*.4)))+'%'},
      {ang:Math.PI*.22,r:ER*2.1,label:'IRIS DEPTH',val:Math.floor(99-3*Math.abs(Math.sin(T*.55)))+'%'},
      {ang:-Math.PI*.78,r:ER*2.1,label:'NEURAL MAP',val:Math.floor(88+7*Math.abs(Math.sin(T*.32)))+'%'},
      {ang:Math.PI*.78,r:ER*2.1,label:'VASCULAR',val:Math.floor(92+5*Math.abs(Math.sin(T*.48)))+'%'},
    ];
    panels.forEach(({ang,r,label,val})=>{
      const px=CX+Math.cos(ang)*r,py=CY+Math.sin(ang)*r;
      const pa=.30+.20*Math.sin(T*1.4+ang);
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(ang)*ER*1.02,CY+Math.sin(ang)*ER*1.02);
      ctx.lineTo(px,py);
      ctx.strokeStyle=`rgba(0,190,255,${pa*.55})`;ctx.lineWidth=.7;ctx.setLineDash([3,6]);ctx.stroke();ctx.setLineDash([]);
      const bw=88,bh=22;
      ctx.save();ctx.shadowBlur=9;ctx.shadowColor=`rgba(0,200,255,${pa*.8})`;
      ctx.strokeStyle=`rgba(0,200,255,${pa})`;ctx.lineWidth=1;ctx.strokeRect(px-bw/2,py-bh/2,bw,bh);
      ctx.shadowBlur=0;ctx.restore();
      ctx.fillStyle=`rgba(0,8,20,.75)`;ctx.fillRect(px-bw/2+.5,py-bh/2+.5,bw-1,bh-1);
      ctx.font="bold 7px 'Courier New',monospace";ctx.textAlign='center';
      ctx.fillStyle=`rgba(0,220,255,${pa+.2})`;ctx.fillText(label,px,py-3);
      ctx.font="bold 8px 'Courier New',monospace";
      ctx.fillStyle=`rgba(0,255,160,${pa+.3})`;ctx.fillText(val,px,py+9);
    });
    const lp=.5+.5*Math.sin(T*2.5);
    ctx.font="bold 12px 'Courier New',monospace";ctx.textAlign='center';
    ctx.save();ctx.shadowBlur=12;ctx.shadowColor='rgba(0,255,160,.8)';
    ctx.fillStyle=`rgba(0,255,160,${.68+.24*lp})`;ctx.fillText('● IRIS BIOMETRIC ACTIVE',CX,CY-ER*1.62);
    ctx.shadowBlur=0;ctx.restore();
    ctx.font="7.5px 'Courier New',monospace";ctx.fillStyle=`rgba(0,200,255,${.48+.20*lp})`;
    ctx.fillText('IDENTITY CONFIRMED  ·  MATCH '+Math.floor(89+8*Math.abs(Math.sin(T*.4)))+'%  ·  SECURE',CX,CY-ER*1.44);

    // global scan line
    const gsY=((T*.015)%1)*H;
    const gsl=ctx.createLinearGradient(0,gsY-1,0,gsY+1);
    gsl.addColorStop(0,'transparent');gsl.addColorStop(.5,'rgba(0,185,255,.008)');gsl.addColorStop(1,'transparent');
    ctx.fillStyle=gsl;ctx.fillRect(0,gsY-1,W,2);

    // corner brackets
    [[18,18,1,1],[W-18,18,-1,1],[W-18,H-18,-1,-1],[18,H-18,1,-1]].forEach(([cx,cy,sx,sy],i)=>{
      const h2=i%2===0?193:42,sz=18;
      ctx.strokeStyle=`hsla(${h2},100%,62%,.18)`;ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(cx+sx*sz,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*sz);ctx.stroke();
      const pa=.18+.18*Math.sin(T*1.4+i);
      ctx.save();ctx.shadowBlur=5;ctx.shadowColor=`hsla(${h2},100%,72%,.8)`;
      ctx.beginPath();ctx.arc(cx,cy,2.2,0,Math.PI*2);ctx.fillStyle=`hsla(${h2},100%,76%,${pa})`;ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    });

    // MOUSE
    if(M.x>0){
      SM.x=SM.x<0?M.x:SM.x+(M.x-SM.x)*.09;
      SM.y=SM.y<0?M.y:SM.y+(M.y-SM.y)*.09;
      const cx=SM.x,cy=SM.y;
      const spd=Math.hypot(M.x-M.px,M.y-M.py),hot=spd>1.8;
      const onEye=Math.hypot(cx-CX,cy-CY)<ER;
      const col=a=>onEye?`rgba(0,255,180,${a})`:`rgba(0,195,255,${a})`;
      const bl=ctx.createRadialGradient(cx,cy,0,cx,cy,46);
      bl.addColorStop(0,col(hot?.20:.10));bl.addColorStop(1,'transparent');
      ctx.fillStyle=bl;ctx.beginPath();ctx.arc(cx,cy,46,0,Math.PI*2);ctx.fill();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(T*2.1+spd*.05);
      ctx.beginPath();ctx.arc(0,0,27,0,Math.PI*1.6);
      ctx.strokeStyle=col(.62+.20*Math.sin(T*2.5));ctx.lineWidth=1.9;ctx.stroke();
      const ec=Math.PI*1.6;
      ctx.save();ctx.shadowBlur=7;ctx.shadowColor=col(1);
      ctx.beginPath();ctx.arc(Math.cos(ec)*27,Math.sin(ec)*27,2.4,0,Math.PI*2);
      ctx.fillStyle=col(.95);ctx.fill();ctx.shadowBlur=0;ctx.restore();ctx.restore();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(-T*1.5);
      ctx.beginPath();ctx.arc(0,0,17,Math.PI*.2,Math.PI*1.8);
      ctx.strokeStyle=col(.38+.18*Math.sin(T*3.1));ctx.lineWidth=1;ctx.stroke();ctx.restore();
      ctx.save();ctx.shadowBlur=8;ctx.shadowColor=col(.85);ctx.strokeStyle=col(.74);ctx.lineWidth=1.3;
      ctx.beginPath();ctx.moveTo(cx,cy-10);ctx.lineTo(cx+6,cy);ctx.lineTo(cx,cy+10);ctx.lineTo(cx-6,cy);ctx.closePath();ctx.stroke();ctx.shadowBlur=0;ctx.restore();
      ctx.save();ctx.shadowBlur=hot?20:10;ctx.shadowColor=hot?'rgba(0,255,180,1)':col(.9);
      ctx.beginPath();ctx.arc(cx,cy,hot?4:2.6,0,Math.PI*2);
      ctx.fillStyle=hot?'rgba(0,255,180,1)':'rgba(195,240,255,.97)';ctx.fill();ctx.shadowBlur=0;ctx.restore();
      ctx.strokeStyle=col(hot?.88:.54);ctx.lineWidth=hot?1.6:1.05;
      [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(cx+dx*6,cy+dy*6);ctx.lineTo(cx+dx*17,cy+dy*17);ctx.stroke();});
      if(hot){
        ctx.font="6.5px 'Courier New',monospace";ctx.textAlign='left';ctx.fillStyle=col(.72);
        ctx.fillText('X:'+String(Math.floor(cx)).padStart(4,'0'),cx+40,cy-2);
        ctx.fillText('Y:'+String(Math.floor(cy)).padStart(4,'0'),cx+40,cy+10);
        ctx.fillStyle=col(.45);ctx.fillText(onEye?'● IRIS LOCK':'● TRACKING',cx+40,cy+24);
      }
    }

    // click effects
    if(M.down&&M.x>0){
      for(let i=0;i<5;i++)RINGS.push({x:M.x,y:M.y,r:4,max:72+i*28,a:.92-i*.16,hue:193+i*18});
      for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;SPARKS.push({x:M.x,y:M.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,age:0,life:28+Math.random()*44,hue:[193,42,145,210,165][i%5]});}
    }
    for(let i=RINGS.length-1;i>=0;i--){
      const r=RINGS[i];r.r+=3.6;r.a*=.90;if(r.r>r.max||r.a<.01){RINGS.splice(i,1);continue;}
      ctx.save();ctx.shadowBlur=12;ctx.shadowColor=`hsla(${r.hue},100%,72%,.8)`;
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.strokeStyle=`hsla(${r.hue},100%,72%,${r.a})`;ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;ctx.restore();
    }
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.95;s.vy*=.95;s.age++;
      if(s.age>=s.life){SPARKS.splice(i,1);continue;}
      const p=s.age/s.life,a=p<.2?p/.2:1-(p-.2)/.8;
      ctx.beginPath();ctx.arc(s.x,s.y,2.2*(1-p*.5),0,Math.PI*2);ctx.fillStyle=`hsla(${s.hue},100%,72%,${a*.9})`;ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  cv.width=innerWidth;cv.height=innerHeight;
  init();requestAnimationFrame(draw);
})();
    </script>
  </body>
</html>
