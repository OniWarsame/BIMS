<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#000610}
      body{overflow-x:hidden;cursor:none}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <!-- Canvas runs BEFORE React — guaranteed to show regardless of bundle cache -->
    <canvas id="bims-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
(function(){
  const cv=document.getElementById('bims-canvas');
  if(!cv)return;
  const x=cv.getContext('2d');
  let T=0,irisRot=0,scanAng=0,eyeOffX=0,eyeOffY=0;
  const M={x:-999,y:-999,px:-999,py:-999,down:false};
  const SM={x:-999,y:-999};
  const RINGS=[],SPARKS=[];
  let nodes=[],traces=[],motes=[];

  window.addEventListener('mousemove',e=>{M.px=M.x;M.py=M.y;M.x=e.clientX;M.y=e.clientY;},{passive:true});
  window.addEventListener('mousedown',()=>{M.down=true;setTimeout(()=>M.down=false,250);});
  window.addEventListener('mouseleave',()=>{M.x=-999;M.y=-999;});
  window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;init();});

  const EYE=new Image();let eyeOK=false;
  EYE.onload=()=>eyeOK=true;
  EYE.src='/eye2.jpg';

  function init(){
    const W=cv.width,H=cv.height;
    nodes=Array.from({length:52},(_,i)=>{
      const nx=30+Math.random()*(W-60),ny=30+Math.random()*(H-60);
      return{x:nx,y:ny,ox:nx,oy:ny,vx:0,vy:0,r:i<8?3+Math.random()*2.5:1+Math.random()*2,
        hue:[193,42,165,145,210][i%5],phase:Math.random()*Math.PI*2};
    });
    traces=Array.from({length:36},()=>{
      const pts=[];let px=Math.random()*W,py=Math.random()*H;
      pts.push({x:px,y:py});
      for(let s=0;s<2+Math.floor(Math.random()*4);s++){
        Math.random()>.5?(px+=(Math.random()-.5)*200):(py+=(Math.random()-.5)*160);
        pts.push({x:Math.max(10,Math.min(W-10,px)),y:Math.max(10,Math.min(H-10,py))});
      }
      return{pts,hue:[193,42,165,210,145][Math.floor(Math.random()*5)],alpha:.05+Math.random()*.09,flow:Math.random()};
    });
    motes=Array.from({length:60},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.14,
      r:.4+Math.random()*1.2,life:Math.random()*Math.PI*2,gold:Math.random()<.22
    }));
  }

  function drawEye(W,H){
    if(!eyeOK)return;
    const CX=W/2,CY=H/2;
    const ew=Math.min(W*.58,720),eh=ew*(EYE.height/EYE.width);
    const ex=CX-ew/2,ey=CY-eh/2;
    if(M.x>0){eyeOffX+=(((M.x-CX)/W)*28-eyeOffX)*.035;eyeOffY+=(((M.y-CY)/H)*18-eyeOffY)*.035;}
    // halo
    const pulse=Math.sin(T*.55);
    const halo=x.createRadialGradient(CX,CY,ew*.08,CX,CY,ew*.95);
    halo.addColorStop(0,`rgba(0,160,255,${.22+.08*pulse})`);
    halo.addColorStop(.4,'rgba(0,80,160,0.10)');
    halo.addColorStop(1,'transparent');
    x.fillStyle=halo;x.fillRect(ex-120,ey-80,ew+240,eh+160);
    // image
    x.save();
    x.beginPath();x.ellipse(CX+eyeOffX*.3,CY+eyeOffY*.3,ew/2,eh/2,0,0,Math.PI*2);x.clip();
    x.globalAlpha=.80+.10*Math.sin(T*.4);
    x.drawImage(EYE,ex+eyeOffX*.6,ey+eyeOffY*.6,ew,eh);
    const vig=x.createRadialGradient(CX,CY,ew*.22,CX,CY,ew*.53);
    vig.addColorStop(0,'transparent');vig.addColorStop(.7,'rgba(0,5,20,.05)');vig.addColorStop(1,'rgba(0,3,15,.75)');
    x.globalAlpha=1;x.fillStyle=vig;x.fillRect(ex,ey,ew,eh);
    x.restore();
    // iris fiber lines
    irisRot+=.0018;
    const iR=Math.min(ew,eh)*.36,pR=Math.min(ew,eh)*.12;
    x.save();
    x.beginPath();x.ellipse(CX,CY,ew*.48,eh*.48,0,0,Math.PI*2);x.clip();
    for(let i=0;i<64;i++){
      const ang=(i/64)*Math.PI*2+irisRot,jit=Math.sin(T*.5+i*.7)*.045;
      x.beginPath();
      x.moveTo(CX+Math.cos(ang+jit)*pR*1.15,CY+Math.sin(ang+jit)*pR*1.15*(eh/ew));
      x.lineTo(CX+Math.cos(ang)*iR*.95,CY+Math.sin(ang)*iR*.95*(eh/ew));
      x.strokeStyle=`hsla(${i%4===0?42:193},100%,68%,${.04+.03*Math.sin(T*.6+i)})`;
      x.lineWidth=.5;x.stroke();
    }
    x.restore();
    // scanning arc
    scanAng=(scanAng+.018)%(Math.PI*2);
    x.save();x.shadowBlur=16;x.shadowColor='rgba(0,255,160,.9)';
    x.strokeStyle='rgba(0,255,160,.75)';x.lineWidth=2.2;
    x.beginPath();x.arc(CX,CY,iR*1.06,scanAng,scanAng+Math.PI*.67);x.stroke();
    x.beginPath();x.arc(CX+Math.cos(scanAng)*iR*1.06,CY+Math.sin(scanAng)*iR*1.06,4,0,Math.PI*2);
    x.fillStyle='rgba(0,255,160,1)';x.fill();x.shadowBlur=0;x.restore();
    // counter arc
    x.save();x.shadowBlur=10;x.shadowColor='rgba(80,180,255,.8)';
    x.strokeStyle='rgba(80,180,255,.5)';x.lineWidth=1.3;
    x.beginPath();x.arc(CX,CY,iR*1.22,-scanAng*.7,-scanAng*.7+Math.PI*.45);x.stroke();
    x.shadowBlur=0;x.restore();
    // pulse rings
    for(let i=0;i<3;i++){
      const ph=((T*.35+i*2.09)%(Math.PI*2));
      const pr=iR*(1.08+.28*(ph/(Math.PI*2)));
      const pa=Math.max(0,.22*(1-ph/(Math.PI*2)));
      x.beginPath();x.arc(CX,CY,pr,0,Math.PI*2);
      x.strokeStyle=`rgba(0,180,255,${pa})`;x.lineWidth=.9;x.stroke();
    }
    // border
    const bp=.5+.5*Math.sin(T*.72);
    x.save();x.shadowBlur=34+14*bp;x.shadowColor=`rgba(0,190,255,${.8+.15*bp})`;
    x.strokeStyle=`rgba(0,200,255,${.38+.26*bp})`;x.lineWidth=2.2;
    x.beginPath();x.ellipse(CX,CY,ew/2,eh/2,0,0,Math.PI*2);x.stroke();
    x.shadowBlur=0;x.restore();
    // corner brackets
    const bs=32;
    [[ex,ey,1,1],[ex+ew,ey,-1,1],[ex+ew,ey+eh,-1,-1],[ex,ey+eh,1,-1]].forEach(([bx,by,sx,sy])=>{
      x.save();x.shadowBlur=14;x.shadowColor='rgba(0,220,255,1)';
      x.strokeStyle='rgba(0,220,255,.88)';x.lineWidth=2.5;
      x.beginPath();x.moveTo(bx+sx*bs,by);x.lineTo(bx,by);x.lineTo(bx,by+sy*bs);x.stroke();
      x.shadowBlur=0;x.restore();
    });
    // corner dots
    [[ex,ey],[ex+ew,ey],[ex+ew,ey+eh],[ex,ey+eh]].forEach(([bx,by],i)=>{
      const pa=.5+.5*Math.sin(T*2.2+i);
      x.save();x.shadowBlur=12;x.shadowColor='rgba(0,220,255,.9)';
      x.beginPath();x.arc(bx,by,4.5,0,Math.PI*2);x.fillStyle=`rgba(0,220,255,${pa})`;x.fill();
      x.shadowBlur=0;x.restore();
    });
    // labels
    const lp=.5+.5*Math.sin(T*2.8);
    x.font="bold 10px 'Courier New',monospace";x.textAlign='left';
    x.fillStyle=`rgba(0,255,140,${.55+.4*lp})`;x.fillText('● IRIS SCAN ACTIVE',ex+10,ey-14);
    x.textAlign='right';x.fillStyle='rgba(0,190,255,.65)';
    x.fillText('MATCH '+Math.floor(85+10*Math.abs(Math.sin(T*.4)))+'%',ex+ew-10,ey-14);
    // side data
    x.font="7px 'Courier New',monospace";x.textAlign='left';
    ['RETINA PATTERN','VASCULAR MAP','DEPTH ANALYSIS','NEURAL SCAN'].forEach((lbl,i)=>{
      const ly=ey+eh*.2+i*(eh*.18);
      const la=.3+.25*Math.sin(T*1.8+i*.7);
      x.fillStyle=`rgba(0,190,255,${la})`;x.fillText('> '+lbl,ex-130,ly);
      x.fillStyle='rgba(0,50,100,.6)';x.fillRect(ex-130,ly+5,90,3);
      const prog=(.4+.6*Math.abs(Math.sin(T*.3+i*.9)))*90;
      const bg=x.createLinearGradient(ex-130,0,ex-130+prog,0);
      bg.addColorStop(0,'rgba(0,200,255,.7)');bg.addColorStop(1,'rgba(0,255,140,.8)');
      x.fillStyle=bg;x.fillRect(ex-130,ly+5,prog,3);
    });
  }

  function draw(){
    T+=.016;
    const W=cv.width,H=cv.height,CX=W/2,CY=H/2;
    x.fillStyle='#000a18';x.fillRect(0,0,W,H);
    // ambient
    const amb=x.createRadialGradient(CX,CY,0,CX,CY,W*.75);
    amb.addColorStop(0,'rgba(0,30,80,.42)');amb.addColorStop(.35,'rgba(0,15,50,.16)');amb.addColorStop(1,'transparent');
    x.fillStyle=amb;x.fillRect(0,0,W,H);
    // motes
    for(const m of motes){
      m.x+=m.vx;m.y+=m.vy;m.life+=.006;
      if(m.x<0)m.x=W;if(m.x>W)m.x=0;if(m.y<0)m.y=H;if(m.y>H)m.y=0;
      const a=.2+.2*Math.sin(m.life);
      x.beginPath();x.arc(m.x,m.y,m.r,0,Math.PI*2);
      x.fillStyle=m.gold?`rgba(255,190,30,${a*.5})`:`rgba(0,190,255,${a*.3})`;x.fill();
    }
    // traces
    for(const tr of traces){
      tr.flow=(tr.flow+.002)%1;
      x.beginPath();x.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++)x.lineTo(tr.pts[i].x,tr.pts[i].y);
      x.strokeStyle=`hsla(${tr.hue},100%,58%,${tr.alpha})`;x.lineWidth=.6;x.stroke();
      for(const p of tr.pts){x.beginPath();x.arc(p.x,p.y,1.1,0,Math.PI*2);x.fillStyle=`hsla(${tr.hue},100%,70%,${tr.alpha*1.6})`;x.fill();}
      const tot=tr.pts.slice(1).reduce((a,p,i)=>a+Math.hypot(p.x-tr.pts[i].x,p.y-tr.pts[i].y),0);
      let tgt=tr.flow*tot,wlk=0;
      for(let i=1;i<tr.pts.length;i++){
        const seg=Math.hypot(tr.pts[i].x-tr.pts[i-1].x,tr.pts[i].y-tr.pts[i-1].y);
        if(wlk+seg>=tgt){
          const t2=(tgt-wlk)/seg;
          const px2=tr.pts[i-1].x+t2*(tr.pts[i].x-tr.pts[i-1].x);
          const py2=tr.pts[i-1].y+t2*(tr.pts[i].y-tr.pts[i-1].y);
          x.save();x.shadowBlur=10;x.shadowColor=`hsla(${tr.hue},100%,85%,1)`;
          x.beginPath();x.arc(px2,py2,2.2,0,Math.PI*2);x.fillStyle=`hsla(${tr.hue},100%,90%,.94)`;x.fill();
          x.shadowBlur=0;x.restore();break;
        }wlk+=seg;
      }
    }
    // dot grid
    for(let gx=0;gx<W;gx+=44)for(let gy=0;gy<H;gy+=44){
      const a=.018+.012*Math.sin(T*.4+gx*.04+gy*.03);
      x.beginPath();x.arc(gx,gy,.65,0,Math.PI*2);x.fillStyle=`hsla(210,100%,65%,${a})`;x.fill();
    }
    // nodes
    for(const n of nodes){
      n.phase+=.012;const pulse=.5+.5*Math.sin(n.phase);
      if(M.x>0){const dx=M.x-n.x,dy=M.y-n.y,d=Math.hypot(dx,dy);if(d<185&&d>.5){const f=.018*(1-d/185);n.vx+=dx/d*f;n.vy+=dy/d*f;}}
      n.vx+=(n.ox-n.x)*.013;n.vy+=(n.oy-n.y)*.013;n.vx*=.87;n.vy*=.87;n.x+=n.vx;n.y+=n.vy;
      const g=x.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3.5);
      g.addColorStop(0,`hsla(${n.hue},100%,65%,${pulse*.24})`);g.addColorStop(1,'transparent');
      x.fillStyle=g;x.beginPath();x.arc(n.x,n.y,n.r*3.5,0,Math.PI*2);x.fill();
      x.save();x.shadowBlur=n.r>2.5?12:5;x.shadowColor=`hsla(${n.hue},100%,72%,.9)`;
      x.beginPath();x.arc(n.x,n.y,n.r*(.85+.15*pulse),0,Math.PI*2);
      x.strokeStyle=`hsla(${n.hue},100%,72%,${.4+.4*pulse})`;x.lineWidth=n.r>2.5?1.3:.9;x.stroke();
      x.shadowBlur=0;x.restore();
    }
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d>125)continue;
      x.beginPath();x.moveTo(nodes[i].x,nodes[i].y);x.lineTo(nodes[j].x,nodes[j].y);
      x.strokeStyle=`rgba(0,190,255,${(1-d/125)*.08})`;x.lineWidth=.5;x.stroke();
    }
    // EYE
    drawEye(W,H);
    // global scan line
    const gsY=((T*.016)%1)*H;
    const gsl=x.createLinearGradient(0,gsY-1,0,gsY+1);
    gsl.addColorStop(0,'transparent');gsl.addColorStop(.5,'rgba(0,190,255,.010)');gsl.addColorStop(1,'transparent');
    x.fillStyle=gsl;x.fillRect(0,gsY-1,W,2);
    // corner brackets
    [[16,16,1,1],[W-16,16,-1,1],[W-16,H-16,-1,-1],[16,H-16,1,-1]].forEach(([cx,cy,sx,sy],i)=>{
      const h2=i%2===0?193:42,sz=20;
      x.strokeStyle=`hsla(${h2},100%,62%,.25)`;x.lineWidth=1.3;
      x.beginPath();x.moveTo(cx+sx*sz,cy);x.lineTo(cx,cy);x.lineTo(cx,cy+sy*sz);x.stroke();
      const pa=.24+.24*Math.sin(T*1.5+i);
      x.save();x.shadowBlur=7;x.shadowColor=`hsla(${h2},100%,72%,.8)`;
      x.beginPath();x.arc(cx,cy,2.6,0,Math.PI*2);x.fillStyle=`hsla(${h2},100%,76%,${pa})`;x.fill();
      x.shadowBlur=0;x.restore();
    });
    // MOUSE
    if(M.x>0){
      SM.x=SM.x<0?M.x:SM.x+(M.x-SM.x)*.09;
      SM.y=SM.y<0?M.y:SM.y+(M.y-SM.y)*.09;
      const cx=SM.x,cy=SM.y;
      const spd=Math.hypot(M.x-M.px,M.y-M.py),hot=spd>1.8;
      const ew=Math.min(W*.58,720),eh=ew*(EYE.height/EYE.width);
      const onEye=eyeOK&&Math.hypot((cx-W/2)/(ew/2),(cy-H/2)/(eh/2))<1;
      const col=a=>onEye?`rgba(0,255,140,${a})`:`rgba(0,190,255,${a})`;
      // bloom
      const bl=x.createRadialGradient(cx,cy,0,cx,cy,52);
      bl.addColorStop(0,col(hot?.18:.09));bl.addColorStop(1,'transparent');
      x.fillStyle=bl;x.beginPath();x.arc(cx,cy,52,0,Math.PI*2);x.fill();
      // outer arc
      x.save();x.translate(cx,cy);x.rotate(T*2.1+spd*.05);
      x.beginPath();x.arc(0,0,30,0,Math.PI*1.58);
      x.strokeStyle=col(.60+.22*Math.sin(T*2.5));x.lineWidth=1.9;x.stroke();
      const ec=Math.PI*1.58;
      x.save();x.shadowBlur=8;x.shadowColor=col(1);
      x.beginPath();x.arc(Math.cos(ec)*30,Math.sin(ec)*30,2.5,0,Math.PI*2);
      x.fillStyle=col(.95);x.fill();x.shadowBlur=0;x.restore();x.restore();
      // inner arc
      x.save();x.translate(cx,cy);x.rotate(-T*1.6);
      x.beginPath();x.arc(0,0,19,Math.PI*.22,Math.PI*1.78);
      x.strokeStyle=col(.40+.18*Math.sin(T*3.2));x.lineWidth=1.1;x.stroke();x.restore();
      // iris ring
      x.beginPath();x.arc(cx,cy,13,0,Math.PI*2);
      x.strokeStyle=col(.22+.12*Math.sin(T*2));x.lineWidth=.8;x.stroke();
      // diamond
      x.save();x.shadowBlur=9;x.shadowColor=col(.85);x.strokeStyle=col(.75);x.lineWidth=1.4;
      x.beginPath();x.moveTo(cx,cy-11);x.lineTo(cx+6.5,cy);x.lineTo(cx,cy+11);x.lineTo(cx-6.5,cy);x.closePath();x.stroke();
      x.shadowBlur=0;x.restore();
      // centre dot
      x.save();x.shadowBlur=hot?20:11;x.shadowColor=hot?'rgba(0,255,140,1)':col(.9);
      x.beginPath();x.arc(cx,cy,hot?4.2:2.8,0,Math.PI*2);
      x.fillStyle=hot?'rgba(0,255,140,1)':'rgba(190,235,255,.97)';x.fill();x.shadowBlur=0;x.restore();
      // ticks
      x.strokeStyle=col(hot?.88:.56);x.lineWidth=hot?1.6:1.1;
      [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
        x.beginPath();x.moveTo(cx+dx*7,cy+dy*7);x.lineTo(cx+dx*19,cy+dy*19);x.stroke();
      });
      if(hot){
        x.font="6.5px 'Courier New',monospace";x.textAlign='left';x.fillStyle=col(.72);
        x.fillText('X:'+String(Math.floor(cx)).padStart(4,'0'),cx+44,cy-3);
        x.fillText('Y:'+String(Math.floor(cy)).padStart(4,'0'),cx+44,cy+9);
        x.fillStyle=col(.48);x.fillText(onEye?'● IRIS LOCK':'● TRACKING',cx+44,cy+23);
      }
    }
    // click effects
    if(M.down&&M.x>0){
      for(let i=0;i<5;i++)RINGS.push({x:M.x,y:M.y,r:5,max:75+i*30,a:.92-i*.16,hue:193+i*18});
      for(let i=0;i<22;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5.5;SPARKS.push({x:M.x,y:M.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,age:0,life:30+Math.random()*48,hue:[193,42,145,210,165][i%5]});}
    }
    for(let i=RINGS.length-1;i>=0;i--){
      const r=RINGS[i];r.r+=3.8;r.a*=.89;if(r.r>r.max||r.a<.01){RINGS.splice(i,1);continue;}
      x.save();x.shadowBlur=13;x.shadowColor=`hsla(${r.hue},100%,72%,.8)`;
      x.beginPath();x.arc(r.x,r.y,r.r,0,Math.PI*2);x.strokeStyle=`hsla(${r.hue},100%,72%,${r.a})`;x.lineWidth=2.1;x.stroke();
      x.shadowBlur=0;x.restore();
    }
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.95;s.vy*=.95;s.age++;
      if(s.age>=s.life){SPARKS.splice(i,1);continue;}
      const p=s.age/s.life,a=p<.2?p/.2:1-(p-.2)/.8;
      x.beginPath();x.arc(s.x,s.y,2.3*(1-p*.5),0,Math.PI*2);x.fillStyle=`hsla(${s.hue},100%,72%,${a*.9})`;x.fill();
    }
    requestAnimationFrame(draw);
  }

  cv.width=innerWidth;cv.height=innerHeight;
  init();
  requestAnimationFrame(draw);
})();
    </script>
  </body>
</html>
