<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#000610}
      body{overflow-x:hidden;cursor:none}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <!-- Canvas runs BEFORE React — guaranteed to show regardless of bundle cache -->
    <canvas id="bims-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
(function(){
  const cv=document.getElementById('bims-canvas');
  if(!cv)return;
  const x=cv.getContext('2d');
  let T=0,iR=0,sA=0,eOX=0,eOY=0,pSc=0;
  const M={x:-999,y:-999,px:-999,py:-999,down:false};
  const SM={x:-999,y:-999};
  const RINGS=[],SPARKS=[];
  let nodes=[],traces=[],motes=[];
  const EYE=new Image();let eyeOK=false;
  EYE.onload=()=>eyeOK=true;
  EYE.src='/eye2.jpg';
  window.addEventListener('mousemove',e=>{M.px=M.x;M.py=M.y;M.x=e.clientX;M.y=e.clientY;},{passive:true});
  window.addEventListener('mousedown',()=>{M.down=true;setTimeout(()=>M.down=false,250);});
  window.addEventListener('mouseleave',()=>{M.x=-999;M.y=-999;});
  window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;init();});

  function init(){
    const W=cv.width,H=cv.height;
    nodes=Array.from({length:48},(_,i)=>{
      const nx=30+Math.random()*(W-60),ny=30+Math.random()*(H-60);
      return{x:nx,y:ny,ox:nx,oy:ny,vx:0,vy:0,r:i<8?2.8+Math.random()*2:1+Math.random()*1.8,
        hue:[193,210,165,42,145][i%5],phase:Math.random()*Math.PI*2};
    });
    traces=Array.from({length:32},()=>{
      const pts=[];let px=Math.random()*W,py=Math.random()*H;pts.push({x:px,y:py});
      for(let s=0;s<2+Math.floor(Math.random()*4);s++){
        Math.random()>.5?(px+=(Math.random()-.5)*180):(py+=(Math.random()-.5)*150);
        pts.push({x:Math.max(10,Math.min(W-10,px)),y:Math.max(10,Math.min(H-10,py))});
      }
      return{pts,hue:[193,42,165,210][Math.floor(Math.random()*4)],alpha:.04+Math.random()*.08,flow:Math.random()};
    });
    motes=Array.from({length:55},()=>({
      x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.16,vy:(Math.random()-.5)*.13,
      r:.3+Math.random()*1.1,life:Math.random()*Math.PI*2,gold:Math.random()<.2
    }));
  }

  function drawEye(W,H){
    if(!eyeOK)return;
    const CX=W/2,CY=H/2;
    const eh=Math.min(H*.82,720),ew=eh*(EYE.width/EYE.height);
    const ex=CX-ew/2,ey=CY-eh/2;
    if(M.x>0){eOX+=((M.x-CX)/W*22-eOX)*.03;eOY+=((M.y-CY)/H*14-eOY)*.03;}
    // halo
    const halo=x.createRadialGradient(CX,CY,ew*.1,CX,CY,ew*.75);
    halo.addColorStop(0,`rgba(0,140,255,${.18+.06*Math.sin(T*.5)})`);
    halo.addColorStop(.5,'rgba(0,60,160,0.08)');halo.addColorStop(1,'transparent');
    x.fillStyle=halo;x.fillRect(0,0,W,H);
    // image - ellipse clipped
    x.save();
    x.beginPath();x.ellipse(CX+eOX*.3,CY+eOY*.3,ew/2,eh/2,0,0,Math.PI*2);x.clip();
    x.globalAlpha=.88+.08*Math.sin(T*.38);
    x.drawImage(EYE,ex+eOX*.55,ey+eOY*.55,ew,eh);
    const vig=x.createRadialGradient(CX,CY,ew*.3,CX,CY,ew*.52);
    vig.addColorStop(0,'transparent');vig.addColorStop(.75,'rgba(0,5,20,.04)');vig.addColorStop(1,'rgba(0,3,15,.65)');
    x.globalAlpha=1;x.fillStyle=vig;x.fillRect(ex,ey,ew,eh);x.restore();
    // iris dims
    const irisR=Math.min(ew,eh)*.30,pupilR=Math.min(ew,eh)*.095;
    // iris fibers
    iR+=.0016;
    x.save();x.beginPath();x.arc(CX,CY,irisR*.97,0,Math.PI*2);x.clip();
    for(let i=0;i<56;i++){
      const ang=(i/56)*Math.PI*2+iR,jit=Math.sin(T*.45+i*.72)*.04;
      x.beginPath();
      x.moveTo(CX+Math.cos(ang+jit)*pupilR*1.2,CY+Math.sin(ang+jit)*pupilR*1.2);
      x.lineTo(CX+Math.cos(ang)*irisR*.9,CY+Math.sin(ang)*irisR*.9);
      x.strokeStyle=`hsla(${i%5===0?42:193},100%,70%,${.03+.025*Math.sin(T*.5+i)})`;
      x.lineWidth=.45;x.stroke();
    }
    x.restore();
    // scan arc
    sA=(sA+.016)%(Math.PI*2);
    x.save();x.shadowBlur=12;x.shadowColor='rgba(0,255,160,.8)';
    x.strokeStyle='rgba(0,255,160,.65)';x.lineWidth=1.8;
    x.beginPath();x.arc(CX,CY,irisR*1.04,sA,sA+Math.PI*.55);x.stroke();
    x.beginPath();x.arc(CX+Math.cos(sA)*irisR*1.04,CY+Math.sin(sA)*irisR*1.04,3.5,0,Math.PI*2);
    x.fillStyle='rgba(0,255,160,.9)';x.fill();x.shadowBlur=0;x.restore();
    // counter arc
    x.save();x.shadowBlur=8;x.shadowColor='rgba(80,180,255,.7)';
    x.strokeStyle='rgba(80,180,255,.45)';x.lineWidth=1.1;
    x.beginPath();x.arc(CX,CY,irisR*1.12,-sA*.65,-sA*.65+Math.PI*.38);x.stroke();
    x.shadowBlur=0;x.restore();
    // pulse rings
    for(let i=0;i<3;i++){
      const ph=((T*.32+i*2.09)%(Math.PI*2));
      const pr=irisR*(1.06+.25*(ph/(Math.PI*2))),pa=Math.max(0,.16*(1-ph/(Math.PI*2)));
      x.beginPath();x.arc(CX,CY,pr,0,Math.PI*2);x.strokeStyle=`rgba(0,175,255,${pa})`;x.lineWidth=.75;x.stroke();
    }
    // border glow
    const bp=.5+.5*Math.sin(T*.68);
    x.save();x.shadowBlur=40+16*bp;x.shadowColor=`rgba(0,185,255,${.75+.18*bp})`;
    x.strokeStyle=`rgba(0,195,255,${.32+.22*bp})`;x.lineWidth=2;
    x.beginPath();x.ellipse(CX,CY,ew/2,eh/2,0,0,Math.PI*2);x.stroke();x.shadowBlur=0;x.restore();
    // pupil gold ring
    const pp=.5+.5*Math.sin(T*.9);
    x.save();x.shadowBlur=20+10*pp;x.shadowColor=`rgba(255,180,60,${.6+.3*pp})`;
    x.strokeStyle=`rgba(255,180,60,${.25+.18*pp})`;x.lineWidth=1.4;
    x.beginPath();x.arc(CX,CY,pupilR*1.35,0,Math.PI*2);x.stroke();x.shadowBlur=0;x.restore();
    // pupil radar
    pSc=(pSc+.022)%(Math.PI*2);
    x.save();x.shadowBlur=8;x.shadowColor='rgba(0,255,200,.9)';
    x.strokeStyle='rgba(0,255,200,.6)';x.lineWidth=1.3;
    x.beginPath();x.moveTo(CX,CY);x.arc(CX,CY,pupilR*1.1,pSc,pSc+Math.PI*.35);x.closePath();
    x.fillStyle='rgba(0,255,200,.08)';x.fill();x.stroke();x.shadowBlur=0;x.restore();
    // text inside iris
    const lp=.5+.5*Math.sin(T*2.5);
    x.save();x.textAlign='center';
    x.font='bold 8.5px "Courier New",monospace';
    x.fillStyle=`rgba(0,255,140,${.5+.4*lp})`;x.fillText('● IRIS SCAN ACTIVE',CX,CY+irisR*.65);
    x.font='bold 11px "Courier New",monospace';
    x.fillStyle=`rgba(255,200,80,${.6+.3*Math.sin(T*.7)})`;
    x.fillText(Math.floor(85+10*Math.abs(Math.sin(T*.38)))+'%',CX,CY+irisR*.82);
    x.font='7px "Courier New",monospace';
    x.fillStyle=`rgba(0,210,255,${.45+.2*Math.sin(T*1.5)})`;
    x.fillText('BIOMETRIC ID',CX,CY-irisR*.72);x.fillText('▼ MATCHING ▼',CX,CY-irisR*.58);
    x.restore();
    // mini bars inside iris
    ['RET','VAS','DEP'].forEach((lbl,i)=>{
      const bx=CX-irisR*.82,by=CY-12+i*14,bl=irisR*.28;
      const prog=(.4+.55*Math.abs(Math.sin(T*.3+i*.9)))*bl;
      x.font='5.5px "Courier New",monospace';x.textAlign='right';
      x.fillStyle=`rgba(0,200,255,${.35+.2*Math.sin(T+i)})`;x.fillText(lbl,bx-3,by+4);
      x.fillStyle='rgba(0,40,80,.5)';x.fillRect(bx,by,bl,2.5);
      const bg=x.createLinearGradient(bx,0,bx+prog,0);
      bg.addColorStop(0,'rgba(0,200,255,.7)');bg.addColorStop(1,'rgba(0,255,160,.85)');
      x.fillStyle=bg;x.fillRect(bx,by,prog,2.5);
    });
    ['NEU','TEM','REC'].forEach((lbl,i)=>{
      const bx=CX+irisR*.54,by=CY-12+i*14,bl=irisR*.28;
      const prog=(.35+.6*Math.abs(Math.sin(T*.28+i*.7+1)))*bl;
      x.font='5.5px "Courier New",monospace';x.textAlign='left';
      x.fillStyle=`rgba(0,200,255,${.35+.2*Math.sin(T*1.1+i)})`;x.fillText(lbl,bx+bl+3,by+4);
      x.fillStyle='rgba(0,40,80,.5)';x.fillRect(bx,by,bl,2.5);
      const bg=x.createLinearGradient(bx,0,bx+prog,0);
      bg.addColorStop(0,'rgba(0,200,255,.7)');bg.addColorStop(1,'rgba(0,255,160,.85)');
      x.fillStyle=bg;x.fillRect(bx,by,prog,2.5);
    });
    // corner marks
    const cs=24;
    [[ex,ey,1,1],[ex+ew,ey,-1,1],[ex+ew,ey+eh,-1,-1],[ex,ey+eh,1,-1]].forEach(([bx,by,sx,sy])=>{
      x.save();x.shadowBlur=10;x.shadowColor='rgba(0,210,255,.8)';
      x.strokeStyle='rgba(0,210,255,.65)';x.lineWidth=2;
      x.beginPath();x.moveTo(bx+sx*cs,by);x.lineTo(bx,by);x.lineTo(bx,by+sy*cs);x.stroke();
      x.shadowBlur=0;x.restore();
    });
  }

  function draw(){
    T+=.016;
    const W=cv.width,H=cv.height,CX=W/2,CY=H/2;
    x.fillStyle='#000810';x.fillRect(0,0,W,H);
    const amb=x.createRadialGradient(CX,CY,0,CX,CY,W*.65);
    amb.addColorStop(0,'rgba(0,25,70,.36)');amb.addColorStop(.4,'rgba(0,12,40,.13)');amb.addColorStop(1,'transparent');
    x.fillStyle=amb;x.fillRect(0,0,W,H);
    for(const m of motes){
      m.x+=m.vx;m.y+=m.vy;m.life+=.006;
      if(m.x<0)m.x=W;if(m.x>W)m.x=0;if(m.y<0)m.y=H;if(m.y>H)m.y=0;
      const a=.16+.16*Math.sin(m.life);
      x.beginPath();x.arc(m.x,m.y,m.r,0,Math.PI*2);
      x.fillStyle=m.gold?`rgba(255,190,30,${a*.5})`:`rgba(0,190,255,${a*.28})`;x.fill();
    }
    for(const tr of traces){
      tr.flow=(tr.flow+.0018)%1;
      x.beginPath();x.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++)x.lineTo(tr.pts[i].x,tr.pts[i].y);
      x.strokeStyle=`hsla(${tr.hue},100%,58%,${tr.alpha})`;x.lineWidth=.55;x.stroke();
      const tot=tr.pts.slice(1).reduce((a,p,i)=>a+Math.hypot(p.x-tr.pts[i].x,p.y-tr.pts[i].y),0);
      let tgt=tr.flow*tot,wlk=0;
      for(let i=1;i<tr.pts.length;i++){
        const seg=Math.hypot(tr.pts[i].x-tr.pts[i-1].x,tr.pts[i].y-tr.pts[i-1].y);
        if(wlk+seg>=tgt){
          const t2=(tgt-wlk)/seg;
          const px2=tr.pts[i-1].x+t2*(tr.pts[i].x-tr.pts[i-1].x);
          const py2=tr.pts[i-1].y+t2*(tr.pts[i].y-tr.pts[i-1].y);
          x.save();x.shadowBlur=9;x.shadowColor=`hsla(${tr.hue},100%,85%,1)`;
          x.beginPath();x.arc(px2,py2,2,0,Math.PI*2);x.fillStyle=`hsla(${tr.hue},100%,90%,.92)`;x.fill();
          x.shadowBlur=0;x.restore();break;
        }wlk+=seg;
      }
    }
    for(let gx=0;gx<W;gx+=46)for(let gy=0;gy<H;gy+=46){
      const a=.014+.009*Math.sin(T*.4+gx*.04+gy*.03);
      x.beginPath();x.arc(gx,gy,.6,0,Math.PI*2);x.fillStyle=`hsla(210,100%,65%,${a})`;x.fill();
    }
    for(const n of nodes){
      n.phase+=.011;const pulse=.5+.5*Math.sin(n.phase);
      if(M.x>0){const dx=M.x-n.x,dy=M.y-n.y,d=Math.hypot(dx,dy);if(d<180&&d>.5){const f=.017*(1-d/180);n.vx+=dx/d*f;n.vy+=dy/d*f;}}
      n.vx+=(n.ox-n.x)*.013;n.vy+=(n.oy-n.y)*.013;n.vx*=.87;n.vy*=.87;n.x+=n.vx;n.y+=n.vy;
      const g=x.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3.2);
      g.addColorStop(0,`hsla(${n.hue},100%,65%,${pulse*.22})`);g.addColorStop(1,'transparent');
      x.fillStyle=g;x.beginPath();x.arc(n.x,n.y,n.r*3.2,0,Math.PI*2);x.fill();
      x.save();x.shadowBlur=n.r>2.5?10:4;x.shadowColor=`hsla(${n.hue},100%,72%,.85)`;
      x.beginPath();x.arc(n.x,n.y,n.r*(.85+.15*pulse),0,Math.PI*2);
      x.strokeStyle=`hsla(${n.hue},100%,72%,${.38+.38*pulse})`;x.lineWidth=n.r>2.5?1.2:.8;x.stroke();
      x.shadowBlur=0;x.restore();
    }
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d>120)continue;
      x.beginPath();x.moveTo(nodes[i].x,nodes[i].y);x.lineTo(nodes[j].x,nodes[j].y);
      x.strokeStyle=`rgba(0,185,255,${(1-d/120)*.07})`;x.lineWidth=.45;x.stroke();
    }
    drawEye(W,H);
    const gsY=((T*.015)%1)*H;
    x.fillStyle=`rgba(0,185,255,.009)`;x.fillRect(0,gsY-.8,W,1.6);
    [[14,14,1,1],[W-14,14,-1,1],[W-14,H-14,-1,-1],[14,H-14,1,-1]].forEach(([cx,cy,sx,sy],i)=>{
      const hu=i%2===0?193:42;
      x.strokeStyle=`hsla(${hu},100%,62%,.20)`;x.lineWidth=1.2;
      x.beginPath();x.moveTo(cx+sx*18,cy);x.lineTo(cx,cy);x.lineTo(cx,cy+sy*18);x.stroke();
    });
    if(M.x>0){
      SM.x=SM.x<0?M.x:SM.x+(M.x-SM.x)*.09;SM.y=SM.y<0?M.y:SM.y+(M.y-SM.y)*.09;
      const cx=SM.x,cy=SM.y,spd=Math.hypot(M.x-M.px,M.y-M.py),hot=spd>1.8;
      const eh=Math.min(H*.82,720),ew=eh*(EYE.width/EYE.height);
      const irisR=Math.min(ew,eh)*.30;
      const dfc=Math.hypot(cx-W/2,cy-H/2);
      const onI=eyeOK&&dfc<irisR*1.1,onE=eyeOK&&Math.hypot((cx-W/2)/(ew/2),(cy-H/2)/(eh/2))<1;
      const col=a=>onI?`rgba(255,210,60,${a})`:onE?`rgba(0,255,170,${a})`:`rgba(0,195,255,${a})`;
      const bl=x.createRadialGradient(cx,cy,0,cx,cy,48);
      bl.addColorStop(0,col(hot?.17:.08));bl.addColorStop(1,'transparent');
      x.fillStyle=bl;x.beginPath();x.arc(cx,cy,48,0,Math.PI*2);x.fill();
      x.save();x.translate(cx,cy);x.rotate(T*2.1+spd*.05);
      x.beginPath();x.arc(0,0,28,0,Math.PI*1.55);
      x.strokeStyle=col(.58+.22*Math.sin(T*2.5));x.lineWidth=1.8;x.stroke();
      const ec=Math.PI*1.55;
      x.save();x.shadowBlur=7;x.shadowColor=col(1);
      x.beginPath();x.arc(Math.cos(ec)*28,Math.sin(ec)*28,2.3,0,Math.PI*2);
      x.fillStyle=col(.95);x.fill();x.shadowBlur=0;x.restore();x.restore();
      x.save();x.translate(cx,cy);x.rotate(-T*1.6);
      x.beginPath();x.arc(0,0,18,Math.PI*.22,Math.PI*1.78);
      x.strokeStyle=col(.38+.18*Math.sin(T*3));x.lineWidth=1.1;x.stroke();x.restore();
      x.beginPath();x.arc(cx,cy,11,0,Math.PI*2);x.strokeStyle=col(.2+.12*Math.sin(T*2));x.lineWidth=.7;x.stroke();
      x.save();x.shadowBlur=8;x.shadowColor=col(.8);x.strokeStyle=col(.72);x.lineWidth=1.3;
      x.beginPath();x.moveTo(cx,cy-10);x.lineTo(cx+6,cy);x.lineTo(cx,cy+10);x.lineTo(cx-6,cy);x.closePath();x.stroke();
      x.shadowBlur=0;x.restore();
      x.save();x.shadowBlur=hot?18:10;x.shadowColor=col(1);
      x.beginPath();x.arc(cx,cy,hot?4:2.6,0,Math.PI*2);
      x.fillStyle=hot?col(1):'rgba(200,240,255,.95)';x.fill();x.shadowBlur=0;x.restore();
      x.strokeStyle=col(hot?.85:.52);x.lineWidth=hot?1.5:1;
      [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
        x.beginPath();x.moveTo(cx+dx*6,cy+dy*6);x.lineTo(cx+dx*17,cy+dy*17);x.stroke();
      });
      if(hot){
        x.font="6.5px 'Courier New',monospace";x.textAlign='left';x.fillStyle=col(.7);
        x.fillText('X:'+String(Math.floor(cx)).padStart(4,'0'),cx+42,cy-3);
        x.fillText('Y:'+String(Math.floor(cy)).padStart(4,'0'),cx+42,cy+9);
        x.fillStyle=col(.45);x.fillText(onI?'◉ IRIS LOCK':onE?'● EYE TRACK':'● TRACKING',cx+42,cy+23);
      }
    }
    if(M.down&&M.x>0){
      for(let i=0;i<5;i++)RINGS.push({x:M.x,y:M.y,r:4,max:70+i*28,a:.9-i*.15,hue:193+i*18});
      for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;SPARKS.push({x:M.x,y:M.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,age:0,life:28+Math.random()*44,hue:[193,42,165,210][i%4]});}
    }
    for(let i=RINGS.length-1;i>=0;i--){
      const r=RINGS[i];r.r+=3.6;r.a*=.89;if(r.r>r.max||r.a<.01){RINGS.splice(i,1);continue;}
      x.save();x.shadowBlur=12;x.shadowColor=`hsla(${r.hue},100%,72%,.8)`;
      x.beginPath();x.arc(r.x,r.y,r.r,0,Math.PI*2);x.strokeStyle=`hsla(${r.hue},100%,72%,${r.a})`;x.lineWidth=2;x.stroke();
      x.shadowBlur=0;x.restore();
    }
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.95;s.vy*=.95;s.age++;
      if(s.age>=s.life){SPARKS.splice(i,1);continue;}
      const p=s.age/s.life,a=p<.2?p/.2:1-(p-.2)/.8;
      x.beginPath();x.arc(s.x,s.y,2.2*(1-p*.5),0,Math.PI*2);x.fillStyle=`hsla(${s.hue},100%,72%,${a*.9})`;x.fill();
    }
    requestAnimationFrame(draw);
  }
  cv.width=innerWidth;cv.height=innerHeight;init();requestAnimationFrame(draw);
})();
    </script>
  </body>
</html>
