<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#000610}
      body{overflow-x:hidden;cursor:none}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <!-- Canvas runs BEFORE React — guaranteed to show regardless of bundle cache -->
    <canvas id="bims-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
(function(){
  const cv=document.getElementById('bims-canvas');
  if(!cv)return;
  const x=cv.getContext('2d');
  let T=0,raf=0,dnaT=0,scanY=0;
  const M={x:-999,y:-999,px:-999,py:-999,down:false};
  const SM={x:-999,y:-999};
  const RINGS=[],SPARKS=[];

  window.addEventListener('mousemove',e=>{M.px=M.x;M.py=M.y;M.x=e.clientX;M.y=e.clientY;},{passive:true});
  window.addEventListener('mousedown',()=>{M.down=true;setTimeout(()=>M.down=false,220);});
  window.addEventListener('mouseleave',()=>{M.x=-999;M.y=-999;});
  window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;init();});

  const IMG=new Image(); let imgOK=false;
  IMG.onload=()=>imgOK=true;
  IMG.src='/fb.jpg';

  let nodes=[],traces=[],motes=[];

  function init(){
    const W=cv.width,H=cv.height;
    nodes=Array.from({length:50},(_,i)=>{
      const nx=30+Math.random()*(W-60),ny=30+Math.random()*(H-60);
      return{x:nx,y:ny,ox:nx,oy:ny,vx:0,vy:0,r:i<10?3+Math.random()*2.5:1+Math.random()*2,
        hue:[193,42,165,145,270][i%5],phase:Math.random()*Math.PI*2};
    });
    traces=Array.from({length:38},()=>{
      const pts=[];let px=Math.random()*W,py=Math.random()*H;
      pts.push({x:px,y:py});
      for(let s=0;s<2+Math.floor(Math.random()*5);s++){
        Math.random()>.5?(px+=(Math.random()-.5)*190):(py+=(Math.random()-.5)*160);
        pts.push({x:Math.max(0,Math.min(W,px)),y:Math.max(0,Math.min(H,py))});
      }
      return{pts,hue:[193,42,165,270,145][Math.floor(Math.random()*5)],alpha:.05+Math.random()*.1,flow:Math.random()};
    });
    motes=Array.from({length:65},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.15,
      r:.4+Math.random()*1.3,life:Math.random()*Math.PI*2,gold:Math.random()<.25
    }));
  }

  function draw(){
    T+=.016;dnaT+=.018;
    const W=cv.width,H=cv.height,CX=W/2,CY=H/2;

    // void
    x.fillStyle='#000814';x.fillRect(0,0,W,H);

    // fingerprint image — centre stage
    if(imgOK){
      const iw=Math.min(W*.62,680),ih=iw*(IMG.height/IMG.width);
      const ix=CX-iw/2,iy=CY-ih/2;

      // outer halo
      const halo=x.createRadialGradient(CX,CY,iw*.1,CX,CY,iw*.85);
      halo.addColorStop(0,'rgba(0,180,255,0.20)');
      halo.addColorStop(.5,'rgba(0,80,180,0.08)');
      halo.addColorStop(1,'transparent');
      x.fillStyle=halo;x.fillRect(ix-100,iy-100,iw+200,ih+200);

      // image
      x.save();
      x.globalAlpha=.70+.12*Math.sin(T*.4);
      x.beginPath();x.roundRect(ix,iy,iw,ih,16);x.clip();
      x.drawImage(IMG,ix,iy,iw,ih);
      // shimmer
      const sh=x.createLinearGradient(ix,iy,ix+iw,iy+ih);
      sh.addColorStop(0,'transparent');
      sh.addColorStop(.45+.12*Math.sin(T*.3),'rgba(0,200,255,.05)');
      sh.addColorStop(1,'transparent');
      x.fillStyle=sh;x.fillRect(ix,iy,iw,ih);
      x.restore();

      // border
      const bp=.5+.5*Math.sin(T*.7);
      x.save();x.shadowBlur=28+14*bp;x.shadowColor=`rgba(0,200,255,${.65+.22*bp})`;
      x.strokeStyle=`rgba(0,210,255,${.32+.22*bp})`;x.lineWidth=2;
      x.beginPath();x.roundRect(ix,iy,iw,ih,16);x.stroke();
      x.shadowBlur=0;x.restore();

      // scan beam
      scanY=(scanY+1.5)%(ih+24);
      const sy=iy-4+scanY;
      const sg=x.createLinearGradient(ix,sy-7,ix,sy+7);
      sg.addColorStop(0,'transparent');sg.addColorStop(.4,'rgba(0,255,150,0.60)');
      sg.addColorStop(.6,'rgba(0,255,150,0.60)');sg.addColorStop(1,'transparent');
      x.fillStyle=sg;x.fillRect(ix+2,sy-7,iw-4,14);

      // corner brackets
      const bs=26;
      [[ix,iy,1,1],[ix+iw,iy,-1,1],[ix+iw,iy+ih,-1,-1],[ix,iy+ih,1,-1]].forEach(([bx,by,sx2,sy2])=>{
        x.save();x.shadowBlur=14;x.shadowColor='rgba(0,220,255,1)';
        x.strokeStyle='rgba(0,220,255,.92)';x.lineWidth=2.5;
        x.beginPath();x.moveTo(bx+sx2*bs,by);x.lineTo(bx,by);x.lineTo(bx,by+sy2*bs);x.stroke();
        x.shadowBlur=0;x.restore();
      });
      // corner dots
      [[ix,iy],[ix+iw,iy],[ix+iw,iy+ih],[ix,iy+ih]].forEach(([bx,by],i)=>{
        const pa=.5+.5*Math.sin(T*2+i);
        x.save();x.shadowBlur=10;x.shadowColor='rgba(0,220,255,.9)';
        x.beginPath();x.arc(bx,by,4,0,Math.PI*2);
        x.fillStyle=`rgba(0,220,255,${pa})`;x.fill();x.shadowBlur=0;x.restore();
      });

      // labels
      const sp=.5+.5*Math.sin(T*3);
      x.font="bold 11px 'Courier New',monospace";
      x.textAlign='left';x.fillStyle=`rgba(0,255,140,${.55+.4*sp})`;
      x.fillText('● BIOMETRIC SCAN ACTIVE',ix+8,iy-13);
      x.textAlign='right';x.fillStyle='rgba(0,200,255,.6)';
      x.fillText(Math.floor((scanY/(ih+24))*100)+'%',ix+iw-8,iy-13);
    }

    // ambient
    const amb=x.createRadialGradient(CX,CY,0,CX,CY,W*.8);
    amb.addColorStop(0,'rgba(0,18,50,.32)');amb.addColorStop(.5,'rgba(0,10,30,.14)');amb.addColorStop(1,'transparent');
    x.fillStyle=amb;x.fillRect(0,0,W,H);

    // motes
    for(const m of motes){
      m.x+=m.vx;m.y+=m.vy;m.life+=.007;
      if(m.x<0)m.x=W;if(m.x>W)m.x=0;if(m.y<0)m.y=H;if(m.y>H)m.y=0;
      const a=.2+.2*Math.sin(m.life);
      x.beginPath();x.arc(m.x,m.y,m.r,0,Math.PI*2);
      x.fillStyle=m.gold?`rgba(255,190,30,${a*.55})`:`rgba(0,200,255,${a*.32})`;x.fill();
    }

    // traces + photons
    for(const tr of traces){
      tr.flow=(tr.flow+.0022)%1;
      x.beginPath();x.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++)x.lineTo(tr.pts[i].x,tr.pts[i].y);
      x.strokeStyle=`hsla(${tr.hue},100%,58%,${tr.alpha})`;x.lineWidth=.6;x.stroke();
      for(const p of tr.pts){x.beginPath();x.arc(p.x,p.y,1.2,0,Math.PI*2);x.fillStyle=`hsla(${tr.hue},100%,70%,${tr.alpha*1.7})`;x.fill();}
      const tot=tr.pts.slice(1).reduce((a,p,i)=>a+Math.hypot(p.x-tr.pts[i].x,p.y-tr.pts[i].y),0);
      let tgt=tr.flow*tot,wlk=0;
      for(let i=1;i<tr.pts.length;i++){
        const seg=Math.hypot(tr.pts[i].x-tr.pts[i-1].x,tr.pts[i].y-tr.pts[i-1].y);
        if(wlk+seg>=tgt){
          const t2=(tgt-wlk)/seg;
          const px2=tr.pts[i-1].x+t2*(tr.pts[i].x-tr.pts[i-1].x);
          const py2=tr.pts[i-1].y+t2*(tr.pts[i].y-tr.pts[i-1].y);
          x.save();x.shadowBlur=10;x.shadowColor=`hsla(${tr.hue},100%,80%,1)`;
          x.beginPath();x.arc(px2,py2,2.2,0,Math.PI*2);
          x.fillStyle=`hsla(${tr.hue},100%,90%,.95)`;x.fill();x.shadowBlur=0;x.restore();break;
        }wlk+=seg;
      }
    }

    // dot grid
    for(let gx=0;gx<W;gx+=44)for(let gy=0;gy<H;gy+=44){
      const a=.02+.014*Math.sin(T*.4+gx*.04+gy*.03);
      x.beginPath();x.arc(gx,gy,.65,0,Math.PI*2);
      x.fillStyle=`hsla(193,100%,62%,${a})`;x.fill();
    }

    // nodes
    for(const n of nodes){
      n.phase+=.012;const pulse=.5+.5*Math.sin(n.phase);
      if(M.x>0){const dx=M.x-n.x,dy=M.y-n.y,d=Math.hypot(dx,dy);if(d<175&&d>.5){const f=.018*(1-d/175);n.vx+=dx/d*f;n.vy+=dy/d*f;}}
      n.vx+=(n.ox-n.x)*.013;n.vy+=(n.oy-n.y)*.013;n.vx*=.87;n.vy*=.87;n.x+=n.vx;n.y+=n.vy;
      const g=x.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3.5);
      g.addColorStop(0,`hsla(${n.hue},100%,65%,${pulse*.24})`);g.addColorStop(1,'transparent');
      x.fillStyle=g;x.beginPath();x.arc(n.x,n.y,n.r*3.5,0,Math.PI*2);x.fill();
      x.save();x.shadowBlur=n.r>2.5?12:5;x.shadowColor=`hsla(${n.hue},100%,72%,.9)`;
      x.beginPath();x.arc(n.x,n.y,n.r*(.85+.15*pulse),0,Math.PI*2);
      x.strokeStyle=`hsla(${n.hue},100%,72%,${.4+.4*pulse})`;x.lineWidth=n.r>2.5?1.3:.9;x.stroke();
      x.shadowBlur=0;x.restore();
    }
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d>128)continue;
      x.beginPath();x.moveTo(nodes[i].x,nodes[i].y);x.lineTo(nodes[j].x,nodes[j].y);
      x.strokeStyle=`rgba(0,200,255,${(1-d/128)*.08})`;x.lineWidth=.5;x.stroke();
    }

    // global scan line
    const gsY=((T*.018)%1)*H;
    const gsl=x.createLinearGradient(0,gsY-1,0,gsY+1);
    gsl.addColorStop(0,'transparent');gsl.addColorStop(.5,'rgba(0,200,255,.011)');gsl.addColorStop(1,'transparent');
    x.fillStyle=gsl;x.fillRect(0,gsY-1,W,2);

    // corner brackets
    [[16,16,1,1],[W-16,16,-1,1],[W-16,H-16,-1,-1],[16,H-16,1,-1]].forEach(([cx2,cy2,sx2,sy2],i)=>{
      const h2=i%2===0?193:42,sz=22;
      x.strokeStyle=`hsla(${h2},100%,65%,.28)`;x.lineWidth=1.4;
      x.beginPath();x.moveTo(cx2+sx2*sz,cy2);x.lineTo(cx2,cy2);x.lineTo(cx2,cy2+sy2*sz);x.stroke();
      const pa=.28+.28*Math.sin(T*1.5+i);
      x.save();x.shadowBlur=8;x.shadowColor=`hsla(${h2},100%,72%,.8)`;
      x.beginPath();x.arc(cx2,cy2,2.8,0,Math.PI*2);
      x.fillStyle=`hsla(${h2},100%,76%,${pa})`;x.fill();x.shadowBlur=0;x.restore();
    });

    // mouse reticle
    if(M.x>0){
      SM.x=SM.x<0?M.x:SM.x+(M.x-SM.x)*.09;
      SM.y=SM.y<0?M.y:SM.y+(M.y-SM.y)*.09;
      const cx=SM.x,cy=SM.y;
      const spd=Math.hypot(M.x-M.px,M.y-M.py),hot=spd>1.8;
      let onImg=false;
      if(imgOK){const iw=Math.min(W*.62,680),ih=iw*(IMG.height/IMG.width),ix=CX-iw/2,iy=CY-ih/2;onImg=cx>=ix&&cx<=ix+iw&&cy>=iy&&cy<=iy+ih;}
      const col=a=>onImg?`rgba(0,255,140,${a})`:`rgba(0,200,255,${a})`;

      // bloom
      const bl=x.createRadialGradient(cx,cy,0,cx,cy,50);
      bl.addColorStop(0,col(hot?.16:.08));bl.addColorStop(1,'transparent');
      x.fillStyle=bl;x.beginPath();x.arc(cx,cy,50,0,Math.PI*2);x.fill();

      // outer arc
      x.save();x.translate(cx,cy);x.rotate(T*2+spd*.05);
      x.beginPath();x.arc(0,0,28,0,Math.PI*1.55);
      x.strokeStyle=col(.58+.22*Math.sin(T*2.5));x.lineWidth=1.8;x.stroke();
      const ec=Math.PI*1.55;
      x.save();x.shadowBlur=6;x.shadowColor=col(1);
      x.beginPath();x.arc(Math.cos(ec)*28,Math.sin(ec)*28,2.2,0,Math.PI*2);
      x.fillStyle=col(.9);x.fill();x.shadowBlur=0;x.restore();x.restore();

      // inner arc
      x.save();x.translate(cx,cy);x.rotate(-T*1.5);
      x.beginPath();x.arc(0,0,18,Math.PI*.25,Math.PI*1.75);
      x.strokeStyle=col(.38+.18*Math.sin(T*3.2));x.lineWidth=1.1;x.stroke();x.restore();

      // diamond
      x.save();x.shadowBlur=8;x.shadowColor=col(.8);
      x.strokeStyle=col(.72);x.lineWidth=1.3;x.beginPath();
      x.moveTo(cx,cy-10);x.lineTo(cx+6,cy);x.lineTo(cx,cy+10);x.lineTo(cx-6,cy);x.closePath();x.stroke();
      x.shadowBlur=0;x.restore();

      // centre dot
      x.save();x.shadowBlur=hot?18:10;x.shadowColor=hot?'rgba(0,255,140,1)':col(.9);
      x.beginPath();x.arc(cx,cy,hot?4:2.8,0,Math.PI*2);
      x.fillStyle=hot?'rgba(0,255,140,.98)':'rgba(200,240,255,.96)';x.fill();x.shadowBlur=0;x.restore();

      // ticks
      x.strokeStyle=col(hot?.85:.55);x.lineWidth=hot?1.5:1.1;
      [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
        x.beginPath();x.moveTo(cx+dx*6,cy+dy*6);x.lineTo(cx+dx*17,cy+dy*17);x.stroke();
      });

      if(hot){
        x.font="6.5px 'Courier New',monospace";x.textAlign='left';
        x.fillStyle=col(.7);
        x.fillText('X:'+String(Math.floor(cx)).padStart(4,'0'),cx+42,cy-3);
        x.fillText('Y:'+String(Math.floor(cy)).padStart(4,'0'),cx+42,cy+9);
        x.fillStyle=col(.45);x.fillText(onImg?'● SCANNING FP':'● TRACKING',cx+42,cy+22);
      }
    }

    // click effects
    if(M.down&&M.x>0){
      for(let i=0;i<5;i++)RINGS.push({x:M.x,y:M.y,r:4,max:72+i*28,a:.9-i*.16,hue:193+i*16});
      for(let i=0;i<20;i++){
        const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;
        SPARKS.push({x:M.x,y:M.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,age:0,life:28+Math.random()*45,hue:[193,42,145,270,165][i%5]});
      }
    }
    for(let i=RINGS.length-1;i>=0;i--){
      const r=RINGS[i];r.r+=3.8;r.a*=.89;
      if(r.r>r.max||r.a<.01){RINGS.splice(i,1);continue;}
      x.save();x.shadowBlur=12;x.shadowColor=`hsla(${r.hue},100%,72%,.8)`;
      x.beginPath();x.arc(r.x,r.y,r.r,0,Math.PI*2);
      x.strokeStyle=`hsla(${r.hue},100%,72%,${r.a})`;x.lineWidth=2;x.stroke();x.shadowBlur=0;x.restore();
    }
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.95;s.vy*=.95;s.age++;
      if(s.age>=s.life){SPARKS.splice(i,1);continue;}
      const p=s.age/s.life,a=p<.2?p/.2:1-(p-.2)/.8;
      x.beginPath();x.arc(s.x,s.y,2.3*(1-p*.5),0,Math.PI*2);
      x.fillStyle=`hsla(${s.hue},100%,72%,${a*.9})`;x.fill();
    }

    raf=requestAnimationFrame(draw);
  }

  cv.width=innerWidth;cv.height=innerHeight;
  init();
  raf=requestAnimationFrame(draw);
})();
    </script>
  </body>
</html>
