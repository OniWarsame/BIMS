<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#00051a}
      body{overflow-x:hidden}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
  </body>
</html>
