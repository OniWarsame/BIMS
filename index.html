<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bims-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIMS — Biometric Identity Management System</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;background:#000610}
      body{overflow-x:hidden;cursor:none}
      #root{min-height:100vh;position:relative;z-index:1}
      #bims-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    </style>
    <script>
      try{
        document.documentElement.classList.remove('dark');
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      }catch(e){}
    </script>
  </head>
  <body>
    <!-- Canvas runs BEFORE React — guaranteed to show regardless of bundle cache -->
    <canvas id="bims-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
// ═══════════════════════════════════════════════════════
//  BIMS BIOMETRIC CANVAS — runs standalone, no imports
//  Fingerprint panel (left) + DNA helix (right) + Eye iris (centre)
//  Precision reticle mouse cursor
// ═══════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('bims-canvas');
  const ctx = canvas.getContext('2d');
  let T = 0, raf = 0;
  const M = {x:-999,y:-999,px:-999,py:-999,click:false};
  const SM = {x:-999,y:-999};

  window.addEventListener('mousemove', e=>{M.px=M.x;M.py=M.y;M.x=e.clientX;M.y=e.clientY;},{passive:true});
  window.addEventListener('mousedown', ()=>{M.click=true;setTimeout(()=>M.click=false,250);});
  window.addEventListener('mouseleave',()=>{M.x=-999;M.y=-999;});
  window.addEventListener('resize', ()=>{canvas.width=innerWidth;canvas.height=innerHeight;init();});

  // Load the eye image
  const IMG = new Image();
  let imgOK = false;
  IMG.onload = ()=>imgOK=true;
  IMG.src = '/eye.jpg';

  const CY=(a)=>`rgba(0,210,255,${a})`;
  const GO=(a)=>`rgba(255,190,30,${a})`;
  const GN=(a)=>`rgba(0,255,140,${a})`;

  // State
  let NODES=[], TRACES=[], MOTES=[];
  const RINGS=[], SPARKS=[];
  let IW=0,IH=0,IOffX=0,IOffY=0,IRot=0;
  let fpScan=0, dnaT=0;

  function init(){
    const W=canvas.width, H=canvas.height;
    IW=Math.min(W,H)*0.40; IH=Math.min(W,H)*0.26;

    NODES=Array.from({length:44},(_,i)=>{
      const x=40+Math.random()*(W-80), y=40+Math.random()*(H-80);
      return {x,y,ox:x,oy:y,vx:0,vy:0,r:i<8?3.5+Math.random()*2:1.2+Math.random()*2,
        hue:[193,42,145,270,165][Math.floor(Math.random()*5)],phase:Math.random()*Math.PI*2};
    });

    TRACES=Array.from({length:32},()=>{
      const pts=[]; let cx=Math.random()*W, cy=Math.random()*H;
      pts.push({x:cx,y:cy});
      for(let s=0;s<3+Math.floor(Math.random()*4);s++){
        Math.random()>.5?(cx+=(Math.random()-.5)*180):(cy+=(Math.random()-.5)*150);
        pts.push({x:cx,y:cy});
      }
      return {pts,hue:[193,42,165,270,145][Math.floor(Math.random()*5)],alpha:.06+Math.random()*.11,flow:Math.random()};
    });

    MOTES=Array.from({length:60},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.14,
      r:.5+Math.random()*1.3,life:Math.random()*Math.PI*2
    }));
  }

  function drawFP(W,H){
    fpScan=(fpScan+1.3)%(H*.55);
    const pw=Math.min(170,W*.13), ph=pw*1.35;
    const px=24, py=H/2-ph/2;
    const cx=px+pw/2, cy=py+ph*.44, r=pw*.35;
    ctx.save();
    // Panel bg
    const bg=ctx.createLinearGradient(px,py,px,py+ph);
    bg.addColorStop(0,'rgba(0,12,30,.78)'); bg.addColorStop(1,'rgba(0,5,18,.85)');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(px,py,pw,ph,10); ctx.fill();
    // Fingerprint arcs
    for(let i=1;i<=9;i++){
      const rr=r*(i/9), h=145+i*8;
      ctx.beginPath(); ctx.arc(cx,cy+r*.08,rr,Math.PI*.06+i*.022,Math.PI*.94-i*.022);
      ctx.strokeStyle=`hsla(${h},90%,58%,${.10+i*.055})`; ctx.lineWidth=.9; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy-r*.08,rr,Math.PI*1.06+i*.022,Math.PI*1.94-i*.022);
      ctx.strokeStyle=`hsla(${h},80%,48%,${.07+i*.04})`; ctx.lineWidth=.7; ctx.stroke();
    }
    // Scan line
    const sy=py+ph*.07+fpScan;
    const sg=ctx.createLinearGradient(0,sy-3,0,sy+3);
    sg.addColorStop(0,'transparent'); sg.addColorStop(.5,GN(.85)); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.fillRect(px+4,sy-3,pw-8,6);
    // Centre dot
    ctx.save(); ctx.shadowBlur=12; ctx.shadowColor=GN(1);
    ctx.beginPath(); ctx.arc(cx,cy,4.5,0,Math.PI*2);
    ctx.fillStyle=GN(.9); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
    // Progress bar
    const pct=fpScan/(H*.55);
    ctx.fillStyle='rgba(0,20,10,.6)'; ctx.fillRect(px+8,py+ph-16,pw-16,5);
    const pg=ctx.createLinearGradient(px+8,0,px+8+(pw-16)*pct,0);
    pg.addColorStop(0,GN(.9)); pg.addColorStop(1,CY(.8));
    ctx.fillStyle=pg; ctx.fillRect(px+8,py+ph-16,(pw-16)*pct,5);
    // Border
    ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=GN(.8);
    ctx.strokeStyle=GN(.6); ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,10); ctx.stroke(); ctx.shadowBlur=0; ctx.restore();
    // Brackets
    const bs=13;
    [[px,py,1,1],[px+pw,py,-1,1],[px+pw,py+ph,-1,-1],[px,py+ph,1,-1]].forEach(([bx,by,sx,sy2])=>{
      ctx.strokeStyle=GN(.95); ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(bx+sx*bs,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+sy2*bs); ctx.stroke();
    });
    // Label
    ctx.font="bold 7px 'Courier New',monospace"; ctx.textAlign='center';
    ctx.fillStyle=GN(.75); ctx.fillText('FINGERPRINT SCAN',cx,py-7);
    ctx.fillStyle=GN(.5+.4*Math.abs(Math.sin(T*3))); ctx.fillText('● SCANNING',cx,py+ph+13);
    ctx.restore();
  }

  function drawDNA(W,H){
    dnaT+=.022;
    const pw=Math.min(160,W*.12), ph=H*.60;
    const px=W-pw-24, py=H/2-ph/2, cx=px+pw/2;
    ctx.save();
    const bg=ctx.createLinearGradient(px,py,px,py+ph);
    bg.addColorStop(0,'rgba(0,8,26,.76)'); bg.addColorStop(1,'rgba(0,4,16,.82)');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(px,py,pw,ph,10); ctx.fill();
    // Helix
    const steps=55;
    for(let i=0;i<steps;i++){
      const prog=i/steps, y=py+14+prog*(ph-28);
      const ang=prog*Math.PI*4.5+dnaT, amp=pw*.27;
      const x1=cx+Math.cos(ang)*amp, x2=cx+Math.cos(ang+Math.PI)*amp;
      const t2=.5+.5*Math.sin(ang*1.5), hue=193+t2*80;
      ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y);
      ctx.strokeStyle=`hsla(${hue},100%,60%,${.12+t2*.22})`; ctx.lineWidth=.9; ctx.stroke();
      const bright=Math.abs(Math.cos(ang));
      if(bright>.45){
        ctx.save(); ctx.shadowBlur=7; ctx.shadowColor=`hsla(${hue},100%,70%,.9)`;
        ctx.beginPath(); ctx.arc(x1,y,2.5*bright,0,Math.PI*2);
        ctx.fillStyle=`hsla(${hue},100%,72%,${.6+bright*.35})`; ctx.fill();
        ctx.beginPath(); ctx.arc(x2,y,2.5*bright,0,Math.PI*2);
        ctx.fillStyle=`hsla(${hue+40},100%,72%,${.6+bright*.35})`; ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
      }
    }
    // Border
    ctx.save(); ctx.shadowBlur=12; ctx.shadowColor=CY(.7);
    ctx.strokeStyle=CY(.5); ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,10); ctx.stroke(); ctx.shadowBlur=0; ctx.restore();
    // Brackets
    const bs=13;
    [[px,py,1,1],[px+pw,py,-1,1],[px+pw,py+ph,-1,-1],[px,py+ph,1,-1]].forEach(([bx,by,sx,sy2])=>{
      ctx.strokeStyle=CY(.9); ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(bx+sx*bs,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+sy2*bs); ctx.stroke();
    });
    ctx.font="bold 7px 'Courier New',monospace"; ctx.textAlign='center';
    ctx.fillStyle=CY(.75); ctx.fillText('DNA SEQUENCE',cx,py-7);
    ctx.fillStyle=CY(.5+.4*Math.abs(Math.sin(T*2.2+1))); ctx.fillText('● ANALYSING',cx,py+ph+13);
    ctx.restore();
  }

  function drawIris(W,H){
    const CX=W*.5,CY=H*.5;
    const breath=Math.sin(T*.52)*.022;
    const iw=IW*(1+breath), ih=IH*(1+breath*.8);
    IRot+=.0013;
    if(M.x>0){IOffX+=(((M.x-CX)/W)*26-IOffX)*.04; IOffY+=(((M.y-CY)/H)*18-IOffY)*.04;}
    // Halo
    const halo=ctx.createRadialGradient(CX,CY,iw*.5,CX,CY,iw*1.6);
    halo.addColorStop(0,CY(.09+.04*Math.sin(T*.9)));
    halo.addColorStop(.5,CY(.03)); halo.addColorStop(1,'transparent');
    ctx.fillStyle=halo; ctx.beginPath(); ctx.ellipse(CX,CY,iw*1.6,ih*1.6,0,0,Math.PI*2); ctx.fill();
    // Image
    if(imgOK){
      ctx.save();
      ctx.beginPath(); ctx.ellipse(CX,CY,iw,ih,0,0,Math.PI*2); ctx.clip();
      const sc=(iw*2.3)/IMG.width;
      ctx.drawImage(IMG,CX-IMG.width*sc/2+IOffX,CY-IMG.height*sc/2+IOffY,IMG.width*sc,IMG.height*sc);
      const vig=ctx.createRadialGradient(CX,CY,iw*.4,CX,CY,iw);
      vig.addColorStop(0,'transparent'); vig.addColorStop(.65,'rgba(0,4,14,.08)'); vig.addColorStop(1,'rgba(0,4,14,.82)');
      ctx.fillStyle=vig; ctx.fillRect(0,0,W,H); ctx.restore();
    }
    // Fibers
    ctx.save();
    ctx.beginPath(); ctx.ellipse(CX,CY,iw*.97,ih*.97,0,0,Math.PI*2); ctx.clip();
    for(let i=0;i<55;i++){
      const ang=(i/55)*Math.PI*2+IRot, jit=Math.sin(T*.4+i*.8)*.04;
      const r1=Math.min(iw,ih)*.33, r2=Math.min(iw,ih)*.87;
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(ang+jit)*r1,CY+Math.sin(ang+jit)*r1*(ih/iw));
      ctx.lineTo(CX+Math.cos(ang)*r2,CY+Math.sin(ang)*r2*(ih/iw));
      ctx.strokeStyle=`hsla(${i%3===0?42:193},100%,65%,${.052+.032*Math.sin(T*.6+i)})`;
      ctx.lineWidth=.5; ctx.stroke();
    }
    ctx.restore();
    // Border
    const bp=.5+.5*Math.sin(T*.72);
    ctx.save(); ctx.shadowBlur=26+12*bp; ctx.shadowColor=CY(.85);
    ctx.strokeStyle=CY(.58+.28*bp); ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.ellipse(CX,CY,iw,ih,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
    // Pulse rings
    for(let i=0;i<3;i++){
      const ph=(T*.38+i*2.1)%(Math.PI*2);
      const pr=iw*(1.05+.24*(ph/(Math.PI*2)));
      const pa=Math.max(0,.18*(1-ph/(Math.PI*2)));
      ctx.beginPath(); ctx.ellipse(CX,CY,pr,pr*(ih/iw),0,0,Math.PI*2);
      ctx.strokeStyle=CY(pa); ctx.lineWidth=.85; ctx.stroke();
    }
    // Eyelid arcs
    ctx.beginPath(); ctx.ellipse(CX,CY-ih*.14,iw*1.06,ih*1.12,0,Math.PI+.07,Math.PI*2-.07);
    ctx.strokeStyle=CY(.055); ctx.lineWidth=.6; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(CX,CY+ih*.14,iw*1.06,ih*1.12,0,.07,Math.PI-.07);
    ctx.strokeStyle=CY(.055); ctx.lineWidth=.6; ctx.stroke();
  }

  function drawMouse(W,H){
    if(M.x<0) return;
    SM.x=SM.x<0?M.x:SM.x+(M.x-SM.x)*.1;
    SM.y=SM.y<0?M.y:SM.y+(M.y-SM.y)*.1;
    const cx=SM.x,cy=SM.y;
    const CX=W*.5,CY=H*.5;
    const inside=Math.hypot((cx-CX)/IW,(cy-CY)/IH)<.88;
    const spd=Math.hypot(M.x-M.px,M.y-M.py);
    const hot=spd>1.5;
    const col=inside?CY:GO;
    // Bloom
    const bl=ctx.createRadialGradient(cx,cy,0,cx,cy,52);
    bl.addColorStop(0,inside?CY(hot?.14:.08):GO(hot?.12:.07));
    bl.addColorStop(1,'transparent');
    ctx.fillStyle=bl; ctx.beginPath(); ctx.arc(cx,cy,52,0,Math.PI*2); ctx.fill();
    // Outer rotating arc
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(T*1.9+spd*.06);
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*1.5);
    ctx.strokeStyle=col(.55+.22*Math.sin(T*2.5)); ctx.lineWidth=1.7; ctx.stroke();
    const ec=Math.PI*1.5;
    ctx.save(); ctx.shadowBlur=6; ctx.shadowColor=col(1);
    ctx.beginPath(); ctx.arc(Math.cos(ec)*30,Math.sin(ec)*30,2.5,0,Math.PI*2);
    ctx.fillStyle=col(.9); ctx.fill(); ctx.shadowBlur=0; ctx.restore();
    ctx.restore();
    // Inner counter-arc
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(-T*1.4);
    ctx.beginPath(); ctx.arc(0,0,19,Math.PI*.3,Math.PI*1.8);
    ctx.strokeStyle=col(.38+.18*Math.sin(T*3)); ctx.lineWidth=1.0; ctx.stroke();
    ctx.restore();
    // Diamond
    const ds=11;
    ctx.save(); ctx.shadowBlur=7; ctx.shadowColor=col(.8);
    ctx.strokeStyle=col(.72); ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(cx,cy-ds); ctx.lineTo(cx+ds*.65,cy); ctx.lineTo(cx,cy+ds); ctx.lineTo(cx-ds*.65,cy);
    ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0; ctx.restore();
    // Centre dot
    ctx.save(); ctx.shadowBlur=hot?16:10; ctx.shadowColor=hot?GN(1):col(.9);
    ctx.beginPath(); ctx.arc(cx,cy,hot?3.8:2.8,0,Math.PI*2);
    ctx.fillStyle=hot?GN(.96):`rgba(200,240,255,.95)`; ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    // 4 ticks
    const arm=12,gap=7;
    ctx.strokeStyle=col(hot?.8:.52); ctx.lineWidth=hot?1.4:1;
    [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(cx+dx*gap,cy+dy*gap); ctx.lineTo(cx+dx*(gap+arm),cy+dy*(gap+arm)); ctx.stroke();
    });
    // Coordinates
    if(hot){
      ctx.font="6.5px 'Courier New',monospace"; ctx.textAlign='left';
      ctx.fillStyle=col(.65);
      ctx.fillText(`X:${String(Math.floor(cx)).padStart(4,'0')}`,cx+44,cy-2);
      ctx.fillText(`Y:${String(Math.floor(cy)).padStart(4,'0')}`,cx+44,cy+10);
    }
  }

  function draw(){
    T+=.016;
    const W=canvas.width, H=canvas.height;
    const CX=W*.5,CY=H*.5;
    // Void
    ctx.fillStyle='#000610'; ctx.fillRect(0,0,W,H);
    // Ambient
    const amb=ctx.createRadialGradient(CX,CY,0,CX,CY,W*.7);
    amb.addColorStop(0,'rgba(0,18,44,.58)'); amb.addColorStop(.4,'rgba(0,10,28,.26)'); amb.addColorStop(1,'transparent');
    ctx.fillStyle=amb; ctx.fillRect(0,0,W,H);
    // Motes
    for(const mo of MOTES){
      mo.x+=mo.vx; mo.y+=mo.vy; mo.life+=.007;
      if(mo.x<0)mo.x=W; if(mo.x>W)mo.x=0; if(mo.y<0)mo.y=H; if(mo.y>H)mo.y=0;
      const a=.28+.28*Math.sin(mo.life);
      ctx.beginPath(); ctx.arc(mo.x,mo.y,mo.r,0,Math.PI*2);
      ctx.fillStyle=((mo.life*3|0)%5===0)?GO(a*.5):CY(a*.27); ctx.fill();
    }
    // Traces + photons
    for(const tr of TRACES){
      tr.flow=(tr.flow+.0022)%1;
      ctx.beginPath(); ctx.moveTo(tr.pts[0].x,tr.pts[0].y);
      for(let i=1;i<tr.pts.length;i++) ctx.lineTo(tr.pts[i].x,tr.pts[i].y);
      ctx.strokeStyle=`hsla(${tr.hue},100%,58%,${tr.alpha})`; ctx.lineWidth=.65; ctx.stroke();
      for(const pt of tr.pts){
        ctx.beginPath(); ctx.arc(pt.x,pt.y,1.3,0,Math.PI*2);
        ctx.fillStyle=`hsla(${tr.hue},100%,68%,${tr.alpha*1.8})`; ctx.fill();
      }
      const total=tr.pts.slice(1).reduce((acc,p,i)=>acc+Math.hypot(p.x-tr.pts[i].x,p.y-tr.pts[i].y),0);
      let tgt=tr.flow*total,walked=0;
      for(let i=1;i<tr.pts.length;i++){
        const seg=Math.hypot(tr.pts[i].x-tr.pts[i-1].x,tr.pts[i].y-tr.pts[i-1].y);
        if(walked+seg>=tgt){
          const t2=(tgt-walked)/seg;
          const px2=tr.pts[i-1].x+t2*(tr.pts[i].x-tr.pts[i-1].x);
          const py2=tr.pts[i-1].y+t2*(tr.pts[i].y-tr.pts[i-1].y);
          ctx.save(); ctx.shadowBlur=9; ctx.shadowColor=`hsla(${tr.hue},100%,80%,1)`;
          ctx.beginPath(); ctx.arc(px2,py2,2.1,0,Math.PI*2);
          ctx.fillStyle=`hsla(${tr.hue},100%,88%,.95)`; ctx.fill();
          ctx.shadowBlur=0; ctx.restore(); break;
        }
        walked+=seg;
      }
    }
    // Dot grid
    for(let gx=0;gx<W;gx+=42){for(let gy=0;gy<H;gy+=42){
      const hue=42+((gx*.2+gy*.15+T*14)%30);
      const a=.026+.016*Math.sin(T*.45+gx*.04+gy*.03);
      ctx.beginPath(); ctx.arc(gx,gy,.68,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},100%,62%,${a})`; ctx.fill();
    }}
    // Nodes
    for(const n of NODES){
      n.phase+=.011;
      const pulse=.5+.5*Math.sin(n.phase);
      if(M.x>0){const dx=M.x-n.x,dy=M.y-n.y,d=Math.hypot(dx,dy);if(d<190&&d>.5){const f=.019*(1-d/190);n.vx+=dx/d*f;n.vy+=dy/d*f;}}
      n.vx+=(n.ox-n.x)*.013; n.vy+=(n.oy-n.y)*.013; n.vx*=.87; n.vy*=.87; n.x+=n.vx; n.y+=n.vy;
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3.5);
      g.addColorStop(0,`hsla(${n.hue},100%,65%,${pulse*.27})`); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*3.5,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.shadowBlur=n.r>3?13:6; ctx.shadowColor=`hsla(${n.hue},100%,70%,.9)`;
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r*(.88+.14*pulse),0,Math.PI*2);
      ctx.strokeStyle=`hsla(${n.hue},100%,70%,${.44+.42*pulse})`; ctx.lineWidth=n.r>3?1.3:.9; ctx.stroke();
      ctx.shadowBlur=0; ctx.restore();
    }
    // Node connections
    for(let i=0;i<NODES.length;i++){for(let j=i+1;j<NODES.length;j++){
      const d=Math.hypot(NODES[i].x-NODES[j].x,NODES[i].y-NODES[j].y);
      if(d>135)continue;
      ctx.beginPath(); ctx.moveTo(NODES[i].x,NODES[i].y); ctx.lineTo(NODES[j].x,NODES[j].y);
      ctx.strokeStyle=CY((1-d/135)*.09); ctx.lineWidth=.5; ctx.stroke();
    }}
    // Left panel
    drawFP(W,H);
    // Right panel
    drawDNA(W,H);
    // Centre iris
    drawIris(W,H);
    // Mouse
    drawMouse(W,H);
    // Click effects
    if(M.click&&M.x>0){
      const ins=Math.hypot((M.x-CX)/IW,(M.y-CY)/IH)<.88;
      for(let i=0;i<4;i++) RINGS.push({x:M.x,y:M.y,r:5,max:65+i*28,a:.9-i*.18,hue:ins?193:42});
      for(let i=0;i<16;i++){
        const ang=Math.random()*Math.PI*2,s=1.5+Math.random()*4.5;
        SPARKS.push({x:M.x,y:M.y,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s,age:0,life:32+Math.random()*42,hue:[193,42,145,270][Math.floor(Math.random()*4)]});
      }
    }
    for(let i=RINGS.length-1;i>=0;i--){
      const rp=RINGS[i]; rp.r+=3.5; rp.a*=.9;
      if(rp.r>rp.max||rp.a<.01){RINGS.splice(i,1);continue;}
      ctx.save(); ctx.shadowBlur=10; ctx.shadowColor=`hsla(${rp.hue},100%,70%,.8)`;
      ctx.beginPath(); ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${rp.hue},100%,72%,${rp.a})`; ctx.lineWidth=1.8; ctx.stroke();
      ctx.shadowBlur=0; ctx.restore();
    }
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i]; s.x+=s.vx; s.y+=s.vy; s.vx*=.96; s.vy*=.96; s.age++;
      if(s.age>=s.life){SPARKS.splice(i,1);continue;}
      const p=s.age/s.life,a=p<.2?p/.2:1-(p-.2)/.8;
      ctx.beginPath(); ctx.arc(s.x,s.y,2.1*(1-p*.5),0,Math.PI*2);
      ctx.fillStyle=`hsla(${s.hue},100%,72%,${a*.9})`; ctx.fill();
    }
    // Corner brackets
    [[14,14,1,1],[innerWidth-14,14,-1,1],[innerWidth-14,innerHeight-14,-1,-1],[14,innerHeight-14,1,-1]].forEach(([x,y,sx,sy2],i)=>{
      const hue=i%2===0?193:42,s=20;
      ctx.strokeStyle=`hsla(${hue},100%,62%,.28)`; ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.moveTo(x+sx*s,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy2*s); ctx.stroke();
      const pa=.28+.28*Math.sin(T*1.4+i);
      ctx.save(); ctx.shadowBlur=7; ctx.shadowColor=`hsla(${hue},100%,72%,.8)`;
      ctx.beginPath(); ctx.arc(x,y,2.6,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},100%,76%,${pa})`; ctx.fill(); ctx.shadowBlur=0; ctx.restore();
    });
    // Scan line
    const sY=((T*.019)%1)*innerHeight;
    const sl=ctx.createLinearGradient(0,sY-1,0,sY+1);
    sl.addColorStop(0,'transparent'); sl.addColorStop(.5,CY(.013)); sl.addColorStop(1,'transparent');
    ctx.fillStyle=sl; ctx.fillRect(0,sY-1,innerWidth,2);

    raf=requestAnimationFrame(draw);
  }

  canvas.width=innerWidth; canvas.height=innerHeight;
  init();
  ctx.fillStyle='#000610'; ctx.fillRect(0,0,canvas.width,canvas.height);
  raf=requestAnimationFrame(draw);
})();
    </script>
